name: Publish Release Docker Image

on:
  release:
    types: [published]

jobs:
  push_to_registry:
    name: Build and push release image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: dpeak0/dpeak-embybot
      REPOSITORY_URL: https://github.com/DPeak0/DPeak-embybot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
          labels: |
            org.opencontainers.image.source=${{ env.REPOSITORY_URL }}
            org.opencontainers.image.url=${{ env.REPOSITORY_URL }}
            org.opencontainers.image.title=DPeak-embybot
            org.opencontainers.image.description=Telegram bot and web panel for Emby operations
          annotations: |
            org.opencontainers.image.source=${{ env.REPOSITORY_URL }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
