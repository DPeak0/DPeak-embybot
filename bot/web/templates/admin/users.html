{% extends "admin/layout.html" %}
{% block title %}用户管理{% endblock %}
{% block heading %}用户管理{% endblock %}

{% block content %}
<!-- 统计卡片 -->
<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.25rem;">
  <div class="card" style="padding:1.25rem;">
    <div style="display:flex; align-items:center; gap:0.625rem; margin-bottom:0.75rem;">
      <div style="width:34px; height:34px; border-radius:0.5rem; background:rgba(148,163,184,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <i class="fa-solid fa-users" style="color:#94a3b8; font-size:0.875rem;"></i>
      </div>
      <span style="font-size:0.75rem; color:#94a3b8;">总用户数</span>
    </div>
    <p style="font-size:1.875rem; font-weight:700; color:#fff; margin:0; line-height:1;" id="statAll">—</p>
  </div>
  <div class="card" style="padding:1.25rem;">
    <div style="display:flex; align-items:center; gap:0.625rem; margin-bottom:0.75rem;">
      <div style="width:34px; height:34px; border-radius:0.5rem; background:rgba(74,222,128,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <i class="fa-solid fa-circle-check" style="color:#4ade80; font-size:0.875rem;"></i>
      </div>
      <span style="font-size:0.75rem; color:#94a3b8;">活跃正常</span>
    </div>
    <p style="font-size:1.875rem; font-weight:700; color:#4ade80; margin:0; line-height:1;" id="statActive">—</p>
  </div>
  <div class="card" style="padding:1.25rem;">
    <div style="display:flex; align-items:center; gap:0.625rem; margin-bottom:0.75rem;">
      <div style="width:34px; height:34px; border-radius:0.5rem; background:rgba(251,146,60,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <i class="fa-solid fa-clock" style="color:#fb923c; font-size:0.875rem;"></i>
      </div>
      <span style="font-size:0.75rem; color:#94a3b8;">7天内到期</span>
    </div>
    <p style="font-size:1.875rem; font-weight:700; color:#fb923c; margin:0; line-height:1;" id="statExpiring">—</p>
  </div>
  <div class="card" style="padding:1.25rem;">
    <div style="display:flex; align-items:center; gap:0.625rem; margin-bottom:0.75rem;">
      <div style="width:34px; height:34px; border-radius:0.5rem; background:rgba(248,113,113,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <i class="fa-solid fa-ban" style="color:#f87171; font-size:0.875rem;"></i>
      </div>
      <span style="font-size:0.75rem; color:#94a3b8;">已封禁</span>
    </div>
    <p style="font-size:1.875rem; font-weight:700; color:#f87171; margin:0; line-height:1;" id="statBanned">—</p>
  </div>
</div>

<!-- 搜索 + Tab -->
<div class="card" style="padding:1rem; margin-bottom:1rem;">
  <div style="display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;">
    <div style="position:relative; flex:1; min-width:180px; max-width:340px;">
      <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:0.75rem; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:0.8125rem; pointer-events:none;"></i>
      <input id="searchInput" type="text" placeholder="搜索用户名 / Emby ID…"
        style="width:100%; padding:0.5rem 0.75rem 0.5rem 2.25rem; background:rgba(51,65,85,0.5); border:1px solid #475569; border-radius:0.5rem; color:#e2e8f0; font-size:0.875rem; outline:none; box-sizing:border-box;" />
    </div>
    <button onclick="doSearch()" class="u-btn-primary">搜索</button>
    <span style="font-size:0.875rem; color:#94a3b8; margin-left:auto;">共 <span id="total" style="font-weight:600; color:#e2e8f0;">0</span> 人</span>
  </div>
  <div style="display:flex; gap:0.375rem; margin-top:0.875rem; flex-wrap:wrap;">
    <button id="tab-all"       onclick="setTab('')"          class="u-tab u-tab-active">全部</button>
    <button id="tab-normal"    onclick="setTab('normal')"    class="u-tab">普通用户</button>
    <button id="tab-public"    onclick="setTab('public')"    class="u-tab">公益用户</button>
    <button id="tab-whitelist" onclick="setTab('whitelist')" class="u-tab">白名单</button>
    <button id="tab-banned"    onclick="setTab('banned')"    class="u-tab">已封禁</button>
  </div>
</div>

<!-- 表格 -->
<div class="card" style="overflow:hidden;">
  <div style="overflow-x:auto;">
    <table style="width:100%; border-collapse:collapse; font-size:0.875rem;">
      <thead>
        <tr style="border-bottom:1px solid rgba(51,65,85,0.6);">
          <th class="u-th" style="min-width:200px;">用户信息</th>
          <th class="u-th">账号等级</th>
          <th class="u-th u-sortable" id="th-expire" onclick="toggleSort('expire')">
            有效期至&nbsp;<span id="si-expire" class="sort-icon">⇅</span>
          </th>
          <th class="u-th u-sortable" id="th-credits" onclick="toggleSort('credits')">
            积分&nbsp;<span id="si-credits" class="sort-icon">⇅</span>
          </th>
          <th class="u-th" style="min-width:150px;">操作</th>
        </tr>
      </thead>
      <tbody id="userList">
        <tr><td colspan="5" style="padding:3rem; text-align:center; color:#475569;">加载中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 分页 -->
<div id="pagination" style="display:flex; justify-content:center; align-items:center; gap:0.375rem; margin-top:1rem; flex-wrap:wrap;"></div>

<!-- ── 编辑用户 Modal ─────────────────────────────────────────────────── -->
<div id="editModal" style="display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.65); backdrop-filter:blur(4px); align-items:center; justify-content:center;">
  <div style="background:#1e293b; border:1px solid rgba(51,65,85,0.7); border-radius:1rem; width:100%; max-width:480px; margin:1rem; box-shadow:0 24px 64px rgba(0,0,0,0.6); overflow:hidden;">

    <!-- 头部 -->
    <div style="display:flex; align-items:center; gap:0.75rem; padding:1.25rem 1.5rem; border-bottom:1px solid rgba(51,65,85,0.5);">
      <div style="width:36px; height:36px; border-radius:0.75rem; background:rgba(232,121,160,0.15); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <i class="fa-solid fa-user-pen" style="color:#e879a0; font-size:0.875rem;"></i>
      </div>
      <div style="flex:1; min-width:0;">
        <p style="margin:0; font-weight:600; color:#fff; font-size:1rem;">编辑用户配置</p>
        <p style="margin:0; font-size:0.75rem; color:#64748b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" id="editSubtitle">—</p>
      </div>
      <button onclick="closeEdit()" style="background:none; border:none; color:#64748b; cursor:pointer; font-size:1.125rem; padding:0.25rem; line-height:1; transition:color .15s; flex-shrink:0;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#64748b'">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- 表单 -->
    <div style="padding:1.5rem; display:flex; flex-direction:column; gap:1.125rem;">

      <!-- 只读信息 -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
        <div>
          <label class="u-label">当前用户名</label>
          <input type="text" id="editName" readonly class="u-input-readonly" />
        </div>
        <div>
          <label class="u-label">Emby ID</label>
          <input type="text" id="editEmbyId" readonly class="u-input-readonly" />
        </div>
      </div>

      <!-- 等级 + 到期 -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
        <div>
          <label class="u-label">账号等级</label>
          <select id="editLv" class="u-input">
            <option value="a">♾ 白名单</option>
            <option value="b">普通用户</option>
            <option value="e">公益用户</option>
            <option value="c">已封禁</option>
          </select>
        </div>
        <div>
          <label class="u-label">到期时间</label>
          <input type="date" id="editExpire" class="u-input" />
          <p style="font-size:0.7rem; color:#64748b; margin:3px 0 0 2px;">留空 = 永久有效</p>
        </div>
      </div>

      <!-- 积分 -->
      <div>
        <label class="u-label">账号积分</label>
        <input type="number" id="editCredits" class="u-input" min="0" placeholder="输入积分数量" />
      </div>

      <!-- 密码 -->
      <div>
        <label class="u-label">重置密码</label>
        <div style="position:relative;">
          <input type="password" id="editPassword" class="u-input" placeholder="如需修改请输入新密码，否则留空" style="padding-right:2.5rem;" />
          <button type="button" onclick="togglePwdVisible()" id="pwdToggleBtn"
            style="position:absolute; right:0.75rem; top:50%; transform:translateY(-50%); background:none; border:none; color:#64748b; cursor:pointer; font-size:0.875rem; padding:0; line-height:1;">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>

    </div>

    <!-- 底部按钮 -->
    <div style="display:flex; justify-content:flex-end; gap:0.75rem; padding:1rem 1.5rem; border-top:1px solid rgba(51,65,85,0.5);">
      <button onclick="closeEdit()"
        style="padding:.5625rem 1.25rem; background:rgba(71,85,105,.4); color:#94a3b8; border:none; border-radius:.5rem; font-size:.875rem; cursor:pointer; transition:background .15s;"
        onmouseover="this.style.background='rgba(71,85,105,.7)'" onmouseout="this.style.background='rgba(71,85,105,.4)'">取消</button>
      <button onclick="saveEdit()" id="editSaveBtn" class="u-btn-primary" style="padding:.5625rem 1.5rem;">
        <i class="fa-solid fa-floppy-disk" style="margin-right:.375rem;"></i>保存配置
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<style>
  .u-tab {
    padding: .375rem .875rem; border-radius: .5rem; font-size: .8125rem; font-weight: 500;
    border: none; cursor: pointer; background: rgba(100,116,139,.18); color: #94a3b8;
    transition: background .15s, color .15s;
  }
  .u-tab:hover { background: rgba(100,116,139,.32); color: #cbd5e1; }
  .u-tab-active { background: rgba(232,121,160,.18) !important; color: #f9a8d4 !important; }

  .u-th {
    padding: .75rem 1rem; text-align: left; color: #64748b;
    font-size: .75rem; font-weight: 500; text-transform: uppercase;
    letter-spacing: .05em; white-space: nowrap;
  }
  .u-sortable { cursor: pointer; user-select: none; transition: color .15s; }
  .u-sortable:hover { color: #94a3b8; }
  .sort-icon { font-size: .75rem; margin-left: 2px; opacity: .45; transition: opacity .15s; }
  .sort-active-col { color: #f9a8d4 !important; }
  .sort-active-col .sort-icon { opacity: 1; }

  .u-td { padding: .875rem 1rem; vertical-align: middle; }
  .u-row { border-bottom: 1px solid rgba(51,65,85,.4); transition: background .12s; }
  .u-row:last-child { border-bottom: none; }
  .u-row:hover { background: rgba(51,65,85,.25); }

  .u-badge {
    display: inline-flex; align-items: center; padding: .2rem .625rem;
    border-radius: 9999px; font-size: .75rem; font-weight: 500; white-space: nowrap;
  }

  .u-btn-primary {
    padding: .5rem 1rem; background: #e879a0; color: #fff; border: none;
    border-radius: .5rem; font-size: .875rem; font-weight: 500;
    cursor: pointer; transition: background .15s;
  }
  .u-btn-primary:hover { background: #c0557e; }

  .u-action-ban   { padding:.3rem .625rem; font-size:.75rem; font-weight:500; border:none; border-radius:.375rem; cursor:pointer; transition:background .15s; background:rgba(248,113,113,.12); color:#f87171; }
  .u-action-ban:hover   { background:rgba(248,113,113,.28); }
  .u-action-unban { padding:.3rem .625rem; font-size:.75rem; font-weight:500; border:none; border-radius:.375rem; cursor:pointer; transition:background .15s; background:rgba(96,165,250,.12);  color:#60a5fa; }
  .u-action-unban:hover { background:rgba(96,165,250,.28); }
  .u-action-edit  { padding:.3rem .625rem; font-size:.75rem; font-weight:500; border:none; border-radius:.375rem; cursor:pointer; transition:background .15s; background:rgba(167,139,250,.12); color:#a78bfa; }
  .u-action-edit:hover  { background:rgba(167,139,250,.28); }

  .u-pg-btn { min-width:2rem; height:2rem; padding:0 .5rem; border:none; border-radius:.4rem; font-size:.8125rem; cursor:pointer; transition:background .15s; display:flex; align-items:center; justify-content:center; }
  .u-pg-btn-normal { background:rgba(51,65,85,.6); color:#94a3b8; }
  .u-pg-btn-normal:hover { background:rgba(71,85,105,.8); color:#e2e8f0; }
  .u-pg-btn-active { background:#e879a0; color:#fff; cursor:default; }
  .u-pg-btn-dots   { background:none; color:#475569; cursor:default; }

  /* Modal */
  .u-label { display:block; font-size:.75rem; color:#94a3b8; font-weight:500; margin-bottom:.375rem; }
  .u-input {
    width:100%; padding:.5rem .75rem; background:rgba(51,65,85,.45); border:1px solid #475569;
    border-radius:.5rem; color:#e2e8f0; font-size:.875rem; outline:none;
    box-sizing:border-box; transition:border-color .15s;
  }
  .u-input:focus { border-color:rgba(232,121,160,.6); }
  .u-input option { background:#1e293b; }
  .u-input-readonly {
    width:100%; padding:.5rem .75rem; background:rgba(30,41,59,.6); border:1px solid rgba(51,65,85,.5);
    border-radius:.5rem; color:#94a3b8; font-size:.875rem; outline:none;
    cursor:default; box-sizing:border-box;
  }
</style>

<script>
let currentQ     = '';
let currentPage  = 1;
let currentType  = '';
let currentSort  = 'created';
let currentOrder = 'desc';
const PAGE_SIZE  = 20;

// 用户数据缓存（key = embyid）—— 避免在 HTML 属性中嵌 JSON
const _userCache = {};

// 头像颜色池
const AVATAR_COLORS = [
  '#e879a0','#60a5fa','#4ade80','#fb923c','#a78bfa',
  '#f472b6','#34d399','#fbbf24','#38bdf8','#f87171',
  '#818cf8','#2dd4bf','#c084fc','#6ee7b7','#e879a0',
];
function avatarColor(name) {
  return AVATAR_COLORS[(name || '?').charCodeAt(0) % AVATAR_COLORS.length];
}

const LV_MAP = {
  a: ['rgba(234,179,8,.15)',   '#fbbf24', '♾ 白名单'],
  b: ['rgba(96,165,250,.15)',  '#60a5fa', '普通用户'],
  e: ['rgba(74,222,128,.15)',  '#4ade80', '公益用户'],
  c: ['rgba(248,113,113,.15)', '#f87171', '已封禁'],
  d: ['rgba(100,116,139,.15)', '#94a3b8', '未注册'],
};

// ── Tab ────────────────────────────────────────────
function setTab(type) {
  currentType = type; currentPage = 1;
  const map = {'':'all','normal':'normal','public':'public','whitelist':'whitelist','banned':'banned'};
  Object.entries(map).forEach(([t, id]) => {
    document.getElementById('tab-' + id)?.classList.toggle('u-tab-active', t === type);
  });
  loadUsers();
}

// ── 搜索 ───────────────────────────────────────────
function doSearch() {
  currentQ = document.getElementById('searchInput').value.trim();
  currentPage = 1;
  loadUsers();
}
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ── 排序 ───────────────────────────────────────────
const SORT_COLS = ['expire', 'credits'];

function toggleSort(col) {
  if (currentSort === col) {
    currentOrder = currentOrder === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort  = col;
    currentOrder = 'asc';
  }
  currentPage = 1;
  _refreshSortUI();
  loadUsers();
}

function _refreshSortUI() {
  SORT_COLS.forEach(col => {
    const th = document.getElementById('th-' + col);
    const si = document.getElementById('si-' + col);
    if (!th || !si) return;
    if (currentSort === col) {
      th.classList.add('sort-active-col');
      si.textContent = currentOrder === 'asc' ? '↑' : '↓';
    } else {
      th.classList.remove('sort-active-col');
      si.textContent = '⇅';
    }
  });
}

// ── 统计卡片 ───────────────────────────────────────
async function loadStats() {
  const d = await api('/admin/api/users/stats');
  document.getElementById('statAll').textContent      = d.total    ?? '—';
  document.getElementById('statActive').textContent   = d.active   ?? '—';
  document.getElementById('statExpiring').textContent = d.expiring ?? '—';
  document.getElementById('statBanned').textContent   = d.banned   ?? '—';
}

// ── 用户列表 ───────────────────────────────────────
async function loadUsers() {
  document.getElementById('userList').innerHTML =
    `<tr><td colspan="5" style="padding:3rem;text-align:center;color:#475569;">加载中…</td></tr>`;
  const url = `/admin/api/users?q=${encodeURIComponent(currentQ)}&page=${currentPage}&page_size=${PAGE_SIZE}&type=${currentType}&sort=${currentSort}&order=${currentOrder}`;
  const data = await api(url);
  document.getElementById('total').textContent = data.total || 0;
  renderRows(data.items || []);
  renderPagination(data.total || 0);
}

function renderRows(items) {
  if (!items.length) {
    document.getElementById('userList').innerHTML =
      `<tr><td colspan="5" style="padding:3rem;text-align:center;color:#475569;">暂无数据</td></tr>`;
    return;
  }

  items.forEach(u => { if (u.embyid) _userCache[u.embyid] = u; });

  const html = items.map(u => {
    const initial   = (u.name || String(u.tg))[0];
    const avatarBg  = avatarColor(u.name || String(u.tg));
    const [bgC, txtC, label] = LV_MAP[u.lv] || LV_MAP['d'];

    // 到期时间着色
    let expHtml = `<span style="color:#94a3b8;font-size:.8125rem;">${u.expire}</span>`;
    if (u.expire !== '无期限' && u.expire) {
      const diff = new Date(u.expire).getTime() - Date.now();
      if (diff < 0)
        expHtml = `<span style="color:#f87171;font-size:.8125rem;">${u.expire}</span>`;
      else if (diff < 7 * 86400 * 1000)
        expHtml = `<span style="color:#fb923c;font-size:.8125rem;">${u.expire}</span>`;
    }

    // 操作按钮 —— 使用 data-embyid 属性，避免在 onclick 内嵌 JSON
    const eid = u.embyid ? u.embyid.replace(/"/g, '&quot;') : '';
    const editBtn  = eid ? `<button data-eid="${eid}" onclick="openEditById(this.dataset.eid)" class="u-action-edit"><i class="fa-solid fa-pen-to-square" style="font-size:.7rem;margin-right:3px;"></i>编辑</button>` : '';
    const banBtn   = u.lv === 'c'
      ? `<button data-eid="${eid}" onclick="unbanUser(this.dataset.eid)" class="u-action-unban">解封</button>`
      : (eid ? `<button data-eid="${eid}" onclick="banUser(this.dataset.eid)" class="u-action-ban">封禁</button>` : '');

    return `
    <tr class="u-row">
      <td class="u-td">
        <div style="display:flex;align-items:center;gap:.75rem;">
          <div style="width:38px;height:38px;border-radius:9999px;background:${avatarBg};flex-shrink:0;
                      display:flex;align-items:center;justify-content:center;font-weight:600;font-size:1rem;color:#fff;line-height:1;">${initial}</div>
          <div style="min-width:0;">
            <p style="margin:0;font-weight:500;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;">${u.name || '—'}</p>
            <p style="margin:0;font-size:.75rem;color:#64748b;margin-top:1px;">TG: <span style="font-family:monospace;">${u.tg}</span></p>
          </div>
        </div>
      </td>
      <td class="u-td"><span class="u-badge" style="background:${bgC};color:${txtC};">${label}</span></td>
      <td class="u-td">${expHtml}</td>
      <td class="u-td" style="color:#cbd5e1;">${u.credits}</td>
      <td class="u-td">
        <div style="display:flex;gap:.375rem;flex-wrap:wrap;">${editBtn}${banBtn}</div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('userList').innerHTML = html;
}

// ── 分页 ───────────────────────────────────────────
function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  const cp = currentPage;
  let pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (cp > 3) pages.push('…');
    for (let i = Math.max(2, cp - 1); i <= Math.min(totalPages - 1, cp + 1); i++) pages.push(i);
    if (cp < totalPages - 2) pages.push('…');
    pages.push(totalPages);
  }
  let html = `<button onclick="goPage(${cp-1})" class="u-pg-btn u-pg-btn-normal" ${cp<=1?'disabled style="opacity:.4;cursor:default;"':''}>
    <i class="fa-solid fa-chevron-left" style="font-size:.7rem;"></i></button>`;
  pages.forEach(p => {
    html += p === '…'
      ? `<button class="u-pg-btn u-pg-btn-dots">…</button>`
      : `<button onclick="goPage(${p})" class="u-pg-btn ${p===cp?'u-pg-btn-active':'u-pg-btn-normal'}">${p}</button>`;
  });
  html += `<button onclick="goPage(${cp+1})" class="u-pg-btn u-pg-btn-normal" ${cp>=totalPages?'disabled style="opacity:.4;cursor:default;"':''}>
    <i class="fa-solid fa-chevron-right" style="font-size:.7rem;"></i></button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  const tot = parseInt(document.getElementById('total').textContent) || 0;
  const totalPages = Math.ceil(tot / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p; loadUsers();
}

// ── 封禁 / 解封 ────────────────────────────────────
async function banUser(embyId) {
  if (!confirm('确定要封禁该用户吗？')) return;
  const d = await api(`/admin/api/users/${embyId}/ban`, { method:'POST' });
  showToast(d.msg || '操作完成', d.ok);
  if (d.ok) { loadUsers(); loadStats(); }
}
async function unbanUser(embyId) {
  if (!confirm('确定要解封该用户吗？')) return;
  const d = await api(`/admin/api/users/${embyId}/unban`, { method:'POST' });
  showToast(d.msg || '操作完成', d.ok);
  if (d.ok) { loadUsers(); loadStats(); }
}

// ── 编辑 Modal ─────────────────────────────────────
let _editEmbyId = '';

function openEditById(embyId) {
  const u = _userCache[embyId];
  if (!u) { showToast('用户数据未找到', false); return; }
  _editEmbyId = embyId;
  document.getElementById('editSubtitle').textContent  = `${u.name || '—'} · ${embyId}`;
  document.getElementById('editName').value    = u.name || '';
  document.getElementById('editEmbyId').value  = embyId;
  document.getElementById('editLv').value      = u.lv || 'b';
  document.getElementById('editExpire').value  = u.expire_raw || '';
  document.getElementById('editCredits').value = u.credits ?? 0;
  document.getElementById('editPassword').value = '';
  // 重置密码框为隐藏
  document.getElementById('editPassword').type = 'password';
  document.getElementById('pwdToggleBtn').innerHTML = '<i class="fa-solid fa-eye"></i>';
  document.getElementById('editModal').style.display = 'flex';
}

function closeEdit() {
  document.getElementById('editModal').style.display = 'none';
}
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeEdit();
});

function togglePwdVisible() {
  const inp = document.getElementById('editPassword');
  const btn = document.getElementById('pwdToggleBtn');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
  } else {
    inp.type = 'password';
    btn.innerHTML = '<i class="fa-solid fa-eye"></i>';
  }
}

async function saveEdit() {
  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:.375rem;"></i>保存中…';

  const payload = {
    lv:       document.getElementById('editLv').value,
    expire:   document.getElementById('editExpire').value,
    credits:  parseInt(document.getElementById('editCredits').value) || 0,
    password: document.getElementById('editPassword').value.trim(),
  };

  const d = await api(`/admin/api/users/${encodeURIComponent(_editEmbyId)}/update`, {
    method: 'POST',
    body: JSON.stringify(payload),
  });

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-floppy-disk" style="margin-right:.375rem;"></i>保存配置';

  showToast(d.msg || '操作完成', d.ok);
  if (d.ok) { closeEdit(); loadUsers(); loadStats(); }
}

// ── 初始化 ─────────────────────────────────────────
_refreshSortUI();
loadStats();
loadUsers();
</script>
{% endblock %}
