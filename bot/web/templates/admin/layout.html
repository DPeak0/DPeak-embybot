<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}管理后台{% endblock %} - Sakura Admin</title>
  <!-- Tailwind CDN（网络可达时生效；不可达时由下方内联样式兜底） -->
  <script>
    (function(){var s=document.createElement('script');s.src='https://cdn.tailwindcss.com';
    s.onload=function(){try{tailwind.config={theme:{extend:{fontFamily:{sans:['Noto Sans SC','sans-serif']},colors:{sakura:{DEFAULT:'#e879a0',dark:'#c0557e'}}}}}}catch(e){}};
    document.head.appendChild(s);})();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

    /* ── Tailwind 工具类内联兜底（CDN 不可达时生效） ── */
    .p-4  { padding: 1rem !important; }
    .p-6  { padding: 1.5rem !important; }
    .p-8  { padding: 2rem !important; }
    .px-4 { padding-left: 1rem !important; padding-right: 1rem !important; }
    .py-3 { padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; }
    .py-2\.5 { padding-top: 0.625rem !important; padding-bottom: 0.625rem !important; }
    .pl-9 { padding-left: 2.25rem !important; }
    .pr-4 { padding-right: 1rem !important; }
    .mb-2 { margin-bottom: 0.5rem !important; }
    .mb-4 { margin-bottom: 1rem !important; }
    .mb-5 { margin-bottom: 1.25rem !important; }
    .mb-8 { margin-bottom: 2rem !important; }
    .mt-1 { margin-top: 0.25rem !important; }
    .w-full { width: 100% !important; }
    .w-16  { width: 4rem !important; }
    .h-16  { height: 4rem !important; }
    .max-w-sm { max-width: 24rem !important; }
    .min-h-screen { min-height: 100vh !important; }
    .flex { display: flex !important; }
    .inline-flex { display: inline-flex !important; }
    .items-center { align-items: center !important; }
    .justify-center { justify-content: center !important; }
    .space-y-5 > * + * { margin-top: 1.25rem !important; }
    .text-center { text-align: center !important; }
    .text-white { color: #fff !important; }
    .text-sm   { font-size: 0.875rem !important; }
    .text-2xl  { font-size: 1.5rem !important; }
    .font-bold   { font-weight: 700 !important; }
    .font-medium { font-weight: 500 !important; }
    .font-semibold { font-weight: 600 !important; }
    .rounded-lg  { border-radius: 0.5rem !important; }
    .rounded-2xl { border-radius: 1rem !important; }
    .block    { display: block !important; }
    .relative { position: relative !important; }
    .absolute { position: absolute !important; }
    .left-3   { left: 0.75rem !important; }
    .top-1\/2 { top: 50% !important; }
    .-translate-y-1\/2 { transform: translateY(-50%) !important; }
    .shadow-xl { box-shadow: 0 20px 25px -5px rgba(0,0,0,.4), 0 8px 10px -6px rgba(0,0,0,.3) !important; }
    .border       { border-width: 1px !important; border-style: solid !important; }
    .border-slate-700\/50 { border-color: rgba(51,65,85,0.5) !important; }
    .border-slate-600    { border-color: #475569 !important; }
    .bg-slate-900 { background-color: #0f172a !important; }
    .bg-slate-800 { background-color: #1e293b !important; }
    .bg-slate-700\/50 { background-color: rgba(51,65,85,0.5) !important; }
    .bg-red-500\/10   { background-color: rgba(239,68,68,0.1) !important; }
    .border-red-500\/20 { border-color: rgba(239,68,68,0.2) !important; }
    .text-red-400 { color: #f87171 !important; }
    .text-slate-300 { color: #cbd5e1 !important; }
    .text-slate-400 { color: #94a3b8 !important; }
    .placeholder-slate-400::placeholder { color: #94a3b8; }
    .bg-sakura, .bg-\[#e879a0\] { background-color: #e879a0 !important; }
    .hover\:bg-sakura-dark:hover { background-color: #c0557e !important; }
    .bg-gradient-to-br { background-image: linear-gradient(135deg, var(--tw-gradient-stops)) !important; }
    .from-sakura { --tw-gradient-from: #e879a0; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(232,121,160,0)); }
    .to-pink-600  { --tw-gradient-to: #db2777; }
    .gap-2 { gap: 0.5rem !important; }
    .focus\:outline-none:focus { outline: none !important; }
    .focus\:ring-2:focus { box-shadow: 0 0 0 2px rgba(232,121,160,0.5) !important; }
    .focus\:border-sakura:focus { border-color: #e879a0 !important; }
    .transition-colors { transition: background-color 0.15s, border-color 0.15s, color 0.15s !important; }

    /* 侧边栏导航链接 */
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      color: #cbd5e1;
      text-decoration: none;
      transition: background-color 0.15s, color 0.15s;
    }
    .sidebar-link:hover {
      background-color: rgba(255,255,255,0.1);
      color: #fff;
    }
    .sidebar-link.active {
      background-color: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 500;
    }

    /* 卡片 */
    .card {
      background-color: #1e293b;
      border-radius: 0.75rem;
      border: 1px solid rgba(51,65,85,0.6);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    /* 徽章 */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.125rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100" style="display:flex; min-height:100vh;">

  <!-- Sidebar -->
  <aside style="width:256px; flex-shrink:0; background:#1e293b; border-right:1px solid rgba(51,65,85,0.5); display:flex; flex-direction:column; min-height:100vh;">
    <!-- Logo -->
    <div style="padding:1.25rem 1.5rem; border-bottom:1px solid rgba(51,65,85,0.5);">
      <div style="display:flex; align-items:center; gap:0.75rem;">
        <div style="width:36px; height:36px; border-radius:0.75rem; background:linear-gradient(135deg,#e879a0,#db2777); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <i class="fa-solid fa-crown" style="color:#fff; font-size:0.875rem;"></i>
        </div>
        <div>
          <p style="font-weight:600; color:#fff; font-size:0.875rem; margin:0;">Sakura Admin</p>
          <p style="font-size:0.75rem; color:#94a3b8; margin:0;">管理员后台</p>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav style="flex:1; padding:1rem 0.75rem; display:flex; flex-direction:column; gap:4px;">
      <a href="/admin/" class="sidebar-link {% if page == 'dashboard' %}active{% endif %}">
        <i class="fa-solid fa-gauge-high" style="width:20px; text-align:center;"></i>
        <span>服务器状态</span>
      </a>
      <a href="/admin/requests" class="sidebar-link {% if page == 'requests' %}active{% endif %}">
        <i class="fa-solid fa-film" style="width:20px; text-align:center;"></i>
        <span>求片管理</span>
      </a>
      <a href="/admin/users" class="sidebar-link {% if page == 'users' %}active{% endif %}">
        <i class="fa-solid fa-users" style="width:20px; text-align:center;"></i>
        <span>用户管理</span>
      </a>
      <a href="/admin/codes" class="sidebar-link {% if page == 'codes' %}active{% endif %}">
        <i class="fa-solid fa-key" style="width:20px; text-align:center;"></i>
        <span>注册码管理</span>
      </a>
      <a href="/admin/commands" class="sidebar-link {% if page == 'commands' %}active{% endif %}">
        <i class="fa-solid fa-terminal" style="width:20px; text-align:center;"></i>
        <span>命令管理</span>
      </a>
      <a href="/admin/audit" class="sidebar-link {% if page == 'audit' %}active{% endif %}">
        <i class="fa-solid fa-clipboard-list" style="width:20px; text-align:center;"></i>
        <span>日志审计</span>
      </a>
      <a href="/admin/settings" class="sidebar-link {% if page == 'settings' %}active{% endif %}">
        <i class="fa-solid fa-gear" style="width:20px; text-align:center;"></i>
        <span>系统设置</span>
      </a>
      <a href="/admin/game" class="sidebar-link {% if page == 'game' %}active{% endif %}">
        <i class="fa-solid fa-dragon" style="width:20px; text-align:center;"></i>
        <span>修仙游戏</span>
      </a>
    </nav>

    <!-- User info + logout -->
    <div style="padding:1rem 0.75rem; border-top:1px solid rgba(51,65,85,0.5);">
      <div style="display:flex; align-items:center; gap:0.75rem; padding:0.5rem 0.75rem;">
        <div style="width:32px; height:32px; border-radius:9999px; background:rgba(232,121,160,0.25); display:flex; align-items:center; justify-content:center; color:#e879a0; font-size:0.875rem; font-weight:700; flex-shrink:0;">
          {{ (admin.username[0] | upper) if admin else 'A' }}
        </div>
        <div style="flex:1; min-width:0;">
          <p style="font-size:0.875rem; font-weight:500; color:#fff; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ admin.username if admin else 'Admin' }}</p>
          <p style="font-size:0.75rem; color:#94a3b8; margin:0;">Emby 管理员</p>
        </div>
        <a href="/admin/logout" title="退出" style="color:#94a3b8; text-decoration:none; transition:color 0.15s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#94a3b8'">
          <i class="fa-solid fa-right-from-bracket"></i>
        </a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div style="flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0;">
    <!-- Top bar -->
    <header style="height:56px; background:rgba(30,41,59,0.8); border-bottom:1px solid rgba(51,65,85,0.5); display:flex; align-items:center; padding:0 1.5rem; gap:1rem; flex-shrink:0;">
      <h1 style="font-size:1.125rem; font-weight:600; color:#fff; margin:0;">{% block heading %}{% endblock %}</h1>
      <div style="margin-left:auto;">
        <span style="font-size:0.75rem; color:#94a3b8;" id="clock"></span>
      </div>
    </header>

    <!-- Page content -->
    <main style="flex:1; overflow:auto; padding:1.5rem;">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Toast notification -->
  <div id="toast" style="position:fixed; bottom:1.5rem; right:1.5rem; z-index:50; display:none;">
    <div style="background:#334155; color:#fff; padding:0.75rem 1.25rem; border-radius:0.75rem; box-shadow:0 10px 40px rgba(0,0,0,0.5); display:flex; align-items:center; gap:0.75rem; font-size:0.875rem; max-width:320px;">
      <i id="toastIcon" class="fa-solid fa-circle-check" style="color:#4ade80;"></i>
      <span id="toastMsg"></span>
    </div>
  </div>

  <script>
    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleString('zh-CN');
    }
    updateClock();
    setInterval(updateClock, 1000);

    function showToast(msg, success = true) {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      document.getElementById('toastIcon').style.color = success ? '#4ade80' : '#f87171';
      document.getElementById('toastIcon').className = success
        ? 'fa-solid fa-circle-check'
        : 'fa-solid fa-circle-xmark';
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    async function api(url, opts = {}) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...opts.headers },
        ...opts,
      });
      return res.json();
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
