<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - DPeakEmby Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container { width: 100%; max-width: 24rem; }
    .logo-area { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 4rem; height: 4rem;
      border-radius: 1rem;
      background: linear-gradient(135deg, #e879a0, #db2777);
      margin-bottom: 1rem;
      box-shadow: 0 10px 30px rgba(232,121,160,0.3);
    }
    .logo-icon i { color: #fff; font-size: 1.5rem; }
    .logo-area h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .logo-area p { font-size: 0.875rem; color: #94a3b8; margin-top: 0.25rem; }
    .card {
      background: #1e293b;
      border-radius: 1rem;
      border: 1px solid rgba(51,65,85,0.5);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      padding: 2rem;
    }
    .error-box {
      margin-bottom: 1.25rem;
      padding: 0.75rem 1rem;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 0.5rem;
      color: #f87171;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 0.875rem;
    }
    .input-wrap input {
      width: 100%;
      padding: 0.625rem 1rem 0.625rem 2.25rem;
      background: rgba(51,65,85,0.5);
      border: 1px solid #475569;
      border-radius: 0.5rem;
      color: #fff;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .input-wrap input::placeholder { color: #94a3b8; }
    .input-wrap input:focus {
      border-color: #e879a0;
      box-shadow: 0 0 0 2px rgba(232,121,160,0.25);
    }
    .btn-submit {
      width: 100%;
      padding: 0.625rem;
      background: #e879a0;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .btn-submit:hover { background: #c0557e; }
    .btn-submit:active { background: #a04060; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-area">
      <div class="logo-icon"><i class="fa-solid fa-crown"></i></div>
      <h1>DPeakEmby Admin</h1>
      <p>使用 Emby 管理员账号登录</p>
    </div>

    <div class="card">
      {% if error %}
      <div class="error-box">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="post" action="/admin/login">
        <div class="form-group">
          <label>Emby 用户名</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" name="username" autocomplete="username" placeholder="管理员用户名" />
          </div>
        </div>
        <div class="form-group">
          <label>Emby 密码</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" autocomplete="current-password" placeholder="••••••••" />
          </div>
        </div>
        <button type="submit" class="btn-submit">登 录</button>
      </form>
    </div>
  </div>
</body>
</html>
