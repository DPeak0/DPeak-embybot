{% extends "admin/layout.html" %}
{% block title %}日志审计{% endblock %}
{% block heading %}日志审计{% endblock %}

{% block content %}
<!-- 过滤栏 -->
<div class="card" style="padding:1rem 1.25rem; margin-bottom:1rem; display:flex; gap:0.75rem; flex-wrap:wrap; align-items:flex-end;">
  <div style="display:flex; flex-direction:column; gap:0.3rem;">
    <label style="font-size:0.75rem; color:#94a3b8;">分类</label>
    <select id="fCategory" onchange="loadAudit(1)"
      style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:0.4rem 0.75rem; border-radius:0.5rem; font-size:0.875rem;">
      <option value="">全部分类</option>
      <option value="credits">积分变动</option>
      <option value="code">注册/邀请码</option>
      <option value="account">账号变动</option>
      <option value="settings">系统设置</option>
      <option value="login">管理员登录</option>
      <option value="request">求片审批</option>
      <option value="bot_cmd">Bot 指令</option>
    </select>
  </div>
  <div style="display:flex; flex-direction:column; gap:0.3rem;">
    <label style="font-size:0.75rem; color:#94a3b8;">来源</label>
    <select id="fSource" onchange="loadAudit(1)"
      style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:0.4rem 0.75rem; border-radius:0.5rem; font-size:0.875rem;">
      <option value="">全部来源</option>
      <option value="web">Web</option>
      <option value="bot">Bot</option>
      <option value="scheduler">定时任务</option>
    </select>
  </div>
  <div style="display:flex; flex-direction:column; gap:0.3rem;">
    <label style="font-size:0.75rem; color:#94a3b8;">管理员</label>
    <select id="fOperator" onchange="loadAudit(1)"
      style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:0.4rem 0.75rem; border-radius:0.5rem; font-size:0.875rem; min-width:120px;">
      <option value="">全部管理员</option>
    </select>
  </div>
  <div style="display:flex; flex-direction:column; gap:0.3rem; position:relative;">
    <label style="font-size:0.75rem; color:#94a3b8;">操作目标TG</label>
    <input type="text" id="fTargetTg" placeholder="搜索目标…" autocomplete="off"
      style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:0.4rem 0.75rem; border-radius:0.5rem; font-size:0.875rem; width:140px;"
      oninput="acFetchTarget()"
      onfocus="acFetchTarget()"
      onblur="acBlurTarget()"
      onkeydown="if(event.key==='Enter'){acBlurTarget();loadAudit(1);} if(event.key==='Escape') acBlurTarget();" />
    <input type="hidden" id="fTargetTgVal" />
    <div id="acTargetDrop" class="ac-dropdown-audit"></div>
  </div>
  <div style="display:flex; flex-direction:column; gap:0.3rem;">
    <label style="font-size:0.75rem; color:#94a3b8;">开始日期</label>
    <input type="date" id="fDateFrom" onchange="loadAudit(1)"
      style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:0.4rem 0.75rem; border-radius:0.5rem; font-size:0.875rem;" />
  </div>
  <div style="display:flex; flex-direction:column; gap:0.3rem;">
    <label style="font-size:0.75rem; color:#94a3b8;">结束日期</label>
    <input type="date" id="fDateTo" onchange="loadAudit(1)"
      style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:0.4rem 0.75rem; border-radius:0.5rem; font-size:0.875rem;" />
  </div>
  <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1; min-width:180px;">
    <label style="font-size:0.75rem; color:#94a3b8;">关键字</label>
    <input type="text" id="fKeyword" placeholder="操作者/目标/详情…" oninput="debounceLoad()"
      style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:0.4rem 0.75rem; border-radius:0.5rem; font-size:0.875rem; width:100%;" />
  </div>
  <div style="display:flex; gap:0.5rem; margin-left:auto; align-items:flex-end; padding-bottom:0.05rem;">
    <button onclick="loadAudit(1)" style="background:#e879a0; color:#fff; border:none; padding:0.45rem 1rem; border-radius:0.5rem; font-size:0.875rem; cursor:pointer;">
      <i class="fa-solid fa-magnifying-glass"></i> 查询
    </button>
    <button onclick="exportCSV()" style="background:#334155; color:#e2e8f0; border:none; padding:0.45rem 1rem; border-radius:0.5rem; font-size:0.875rem; cursor:pointer;">
      <i class="fa-solid fa-file-csv"></i> 导出
    </button>
    <button onclick="showCleanup()" style="background:#7f1d1d; color:#fca5a5; border:none; padding:0.45rem 0.875rem; border-radius:0.5rem; font-size:0.875rem; cursor:pointer;">
      <i class="fa-solid fa-trash-can"></i> 清理
    </button>
  </div>
</div>

<!-- 统计条 -->
<div id="auditStat" style="font-size:0.8125rem; color:#64748b; margin-bottom:0.75rem; padding-left:0.25rem;">加载中…</div>

<!-- 表格 -->
<div class="card" style="overflow:hidden;">
  <div style="overflow-x:auto;">
    <table style="width:100%; border-collapse:collapse; font-size:0.875rem;">
      <thead>
        <tr style="background:rgba(15,23,42,0.6); text-align:left;">
          <th style="padding:0.75rem 1rem; color:#94a3b8; font-weight:500; white-space:nowrap;">时间</th>
          <th style="padding:0.75rem 0.5rem; color:#94a3b8; font-weight:500;">分类</th>
          <th style="padding:0.75rem 0.5rem; color:#94a3b8; font-weight:500;">操作</th>
          <th style="padding:0.75rem 0.5rem; color:#94a3b8; font-weight:500;">来源</th>
          <th style="padding:0.75rem 0.5rem; color:#94a3b8; font-weight:500;">操作者</th>
          <th style="padding:0.75rem 0.5rem; color:#94a3b8; font-weight:500;">目标</th>
          <th style="padding:0.75rem 0.5rem; color:#94a3b8; font-weight:500;">变更前</th>
          <th style="padding:0.75rem 0.5rem; color:#94a3b8; font-weight:500;">变更后</th>
          <th style="padding:0.75rem 1rem; color:#94a3b8; font-weight:500;">详情</th>
        </tr>
      </thead>
      <tbody id="auditTbody">
        <tr><td colspan="9" style="text-align:center; padding:2rem; color:#64748b;">加载中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 分页 -->
<div id="auditPager" style="display:flex; justify-content:center; align-items:center; gap:0.5rem; margin-top:1rem; flex-wrap:wrap;"></div>

<!-- 详情弹窗 -->
<div id="detailModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:100; align-items:center; justify-content:center;">
  <div class="card" style="width:min(560px,96vw); padding:1.5rem; position:relative; max-height:80vh; overflow-y:auto;">
    <button onclick="closeDetail()" style="position:absolute; top:1rem; right:1rem; background:none; border:none; color:#94a3b8; font-size:1.25rem; cursor:pointer;">✕</button>
    <h3 style="margin:0 0 1rem; font-size:1rem; font-weight:600; color:#e2e8f0;">日志详情</h3>
    <div id="detailBody"></div>
  </div>
</div>

<!-- 清理确认弹窗 -->
<div id="cleanupModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:100; align-items:center; justify-content:center;">
  <div class="card" style="width:min(400px,94vw); padding:1.5rem; position:relative;">
    <button onclick="closeCleanup()" style="position:absolute; top:1rem; right:1rem; background:none; border:none; color:#94a3b8; font-size:1.25rem; cursor:pointer;">✕</button>
    <h3 style="margin:0 0 1rem; font-size:1rem; font-weight:600; color:#fca5a5;"><i class="fa-solid fa-triangle-exclamation"></i> 清理旧日志</h3>
    <p style="font-size:0.875rem; color:#94a3b8; margin:0 0 1rem;">将删除指定天数之前的所有日志记录，此操作不可恢复。</p>
    <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:1.25rem;">
      <label style="font-size:0.875rem; color:#cbd5e1;">保留最近</label>
      <input type="number" id="cleanupDays" value="90" min="1" style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:0.4rem 0.75rem; border-radius:0.5rem; font-size:0.875rem; width:80px;" />
      <span style="font-size:0.875rem; color:#cbd5e1;">天的日志</span>
    </div>
    <div style="display:flex; gap:0.75rem;">
      <button onclick="doCleanup()" style="flex:1; background:#7f1d1d; color:#fca5a5; border:none; padding:0.6rem; border-radius:0.5rem; font-size:0.875rem; cursor:pointer; font-weight:500;">确认清理</button>
      <button onclick="closeCleanup()" style="flex:1; background:#334155; color:#e2e8f0; border:none; padding:0.6rem; border-radius:0.5rem; font-size:0.875rem; cursor:pointer;">取消</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<style>
  .audit-row { border-bottom: 1px solid rgba(51,65,85,0.35); }
  .audit-row:hover { background: rgba(255,255,255,0.03); }
  .audit-row td { padding: 0.65rem 0.5rem; vertical-align: middle; }
  .audit-row td:first-child { padding-left: 1rem; }
  .audit-row td:last-child { padding-right: 1rem; }
  .cat-badge {
    display:inline-block; padding:0.125rem 0.5rem; border-radius:9999px;
    font-size:0.7rem; font-weight:500; white-space:nowrap;
  }
  .src-badge {
    display:inline-block; padding:0.1rem 0.4rem; border-radius:4px;
    font-size:0.7rem; font-weight:500; white-space:nowrap;
  }
  .val-pill {
    display:inline-block; max-width:100px; overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; color:#94a3b8; font-size:0.8rem; vertical-align:middle;
    cursor:default;
  }
  .detail-link { color:#e879a0; cursor:pointer; font-size:0.8rem; text-decoration:underline dotted; }
  .detail-kv { display:flex; gap:0.75rem; padding:0.45rem 0; border-bottom:1px solid rgba(51,65,85,0.35); font-size:0.875rem; }
  .detail-kv:last-child { border-bottom:none; }
  .detail-k { color:#94a3b8; min-width:80px; flex-shrink:0; }
  .detail-v { color:#e2e8f0; word-break:break-all; }
  .pager-btn {
    background:#1e293b; border:1px solid #334155; color:#94a3b8;
    padding:0.3rem 0.625rem; border-radius:0.375rem; font-size:0.8125rem; cursor:pointer;
    transition:background 0.15s;
  }
  .pager-btn:hover { background:#334155; color:#fff; }
  .pager-btn.active { background:#e879a0; border-color:#e879a0; color:#fff; }
  .ac-dropdown-audit {
    display: none;
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 0.5rem;
    min-width: 180px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 300;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .ac-item-audit {
    padding: 0.4rem 0.75rem;
    font-size: 0.875rem;
    color: #e2e8f0;
    cursor: pointer;
    white-space: nowrap;
  }
  .ac-item-audit:hover { background: rgba(255,255,255,0.08); }
</style>
<script>
const _CAT_COLORS = {
  credits: ['#fcd34d','#713f12'], code: ['#818cf8','#1e1b4b'],
  account: ['#67e8f9','#164e63'], settings: ['#86efac','#14532d'],
  login:   ['#f9a8d4','#4a044e'], request: ['#fda4af','#4c0519'],
  bot_cmd: ['#d8b4fe','#3b0764'],
};
const _CAT_NAMES = {
  credits:'积分变动', code:'注册/邀请码', account:'账号变动',
  settings:'系统设置', login:'管理员登录', request:'求片审批', bot_cmd:'Bot 指令',
};
const _SRC_COLORS = { web:'#60a5fa', bot:'#4ade80', scheduler:'#fb923c' };
const _ACTION_NAMES = {
  // 通用
  update: '更新', create: '创建', delete: '删除',
  // 账号
  ban: '封禁', unban: '解封', register: '注册', self_delete: '自助注销',
  reset_pwd: '重置密码', auto_renew: '自动续期', auto_ban: '自动封禁',
  auto_delete: '自动删号', update_lv: '修改等级', gift: '赠送资格',
  kick: '踢出群', open_extra: '开放扩展库', close_extra: '关闭扩展库',
  // 积分/兑换
  checkin: '签到', exchange_unban: '积分解封', exchange_whitelist: '积分兑白名单',
  exchange_code: '积分兑注册码',
  // 注册/续期码
  renew: '使用续期码',
  // 求片
  approve: '批准求片', complete: '标记完成', reject: '拒绝求片',
  edit: '编辑', batch_approve: '批量批准', batch_reject: '批量拒绝',
  batch_complete: '批量完成', batch_delete: '批量删除',
  // 登录
  login: '登录', logout: '登出',
  // 开关
  open_register: '开放注册', close_register: '关闭注册',
};

let _curPage = 1;
let _debounceTimer = null;

function debounceLoad() {
  clearTimeout(_debounceTimer);
  _debounceTimer = setTimeout(() => loadAudit(1), 400);
}

function _params(page) {
  const p = new URLSearchParams();
  const cat  = document.getElementById('fCategory').value;
  const src  = document.getElementById('fSource').value;
  const op   = document.getElementById('fOperator').value;
  // 优先用隐藏字段（选择建议时写入）；否则尝试直接用输入框的数字值
  const tgtVal = document.getElementById('fTargetTgVal').value.trim();
  const tgtRaw = document.getElementById('fTargetTg').value.trim();
  const tgt = tgtVal || (tgtRaw && /^\d+$/.test(tgtRaw) ? tgtRaw : '');
  const df   = document.getElementById('fDateFrom').value;
  const dt   = document.getElementById('fDateTo').value;
  const kw   = document.getElementById('fKeyword').value.trim();
  if (cat) p.set('category', cat);
  if (src) p.set('source', src);
  if (op)  p.set('operator_tg', op);
  if (tgt) p.set('target_tg', tgt);
  if (df)  p.set('date_from', df);
  if (dt)  p.set('date_to', dt);
  if (kw)  p.set('keyword', kw);
  p.set('page', page);
  p.set('page_size', 50);
  return p;
}

async function loadAudit(page = 1) {
  _curPage = page;
  document.getElementById('auditStat').textContent = '加载中…';
  document.getElementById('auditTbody').innerHTML =
    '<tr><td colspan="9" style="text-align:center;padding:2rem;color:#64748b;">加载中…</td></tr>';

  const data = await api('/admin/api/audit?' + _params(page).toString());
  const items = data.items || [];
  const total = data.total || 0;

  document.getElementById('auditStat').textContent =
    `共 ${total} 条记录，当前第 ${page} 页`;

  if (items.length === 0) {
    document.getElementById('auditTbody').innerHTML =
      '<tr><td colspan="9" style="text-align:center;padding:2rem;color:#64748b;">暂无日志</td></tr>';
    document.getElementById('auditPager').innerHTML = '';
    return;
  }

  document.getElementById('auditTbody').innerHTML = items.map(r => {
    const cc = _CAT_COLORS[r.category] || ['#94a3b8','#1e293b'];
    const sc = _SRC_COLORS[r.source] || '#94a3b8';
    const catBadge = `<span class="cat-badge" style="background:${cc[1]};color:${cc[0]};">${_CAT_NAMES[r.category]||r.category}</span>`;
    const srcBadge = r.source ? `<span class="src-badge" style="background:rgba(0,0,0,0.3);color:${sc};border:1px solid ${sc}40;">${r.source}</span>` : '';
    const actionLabel = _ACTION_NAMES[r.action] || r.action;
    const opStr = r.operator_name || (r.operator_tg ? `#${r.operator_tg}` : '-');
    const tgStr = r.target_name   || (r.target_tg   ? `#${r.target_tg}`   : '-');
    const beforeV = r.before_val ? `<span class="val-pill" title="${esc(r.before_val)}">${esc(r.before_val)}</span>` : '<span style="color:#475569;">-</span>';
    const afterV  = r.after_val  ? `<span class="val-pill" title="${esc(r.after_val)}">${esc(r.after_val)}</span>`  : '<span style="color:#475569;">-</span>';
    const detail  = (r.detail || r.note) ? `<span class="detail-link" onclick="openDetail(${r.id})">查看</span>` : '<span style="color:#475569;">-</span>';
    return `<tr class="audit-row">
      <td style="color:#94a3b8;white-space:nowrap;font-size:0.8rem;">${r.created_at}</td>
      <td>${catBadge}</td>
      <td style="color:#e2e8f0;">${esc(actionLabel)}</td>
      <td>${srcBadge}</td>
      <td style="color:#cbd5e1;">${esc(opStr)}</td>
      <td style="color:#cbd5e1;">${esc(tgStr)}</td>
      <td>${beforeV}</td>
      <td>${afterV}</td>
      <td>${detail}</td>
    </tr>`;
  }).join('');

  // 分页
  const totalPages = Math.ceil(total / 50);
  renderPager(page, totalPages);

  // 保存 items 供 openDetail 使用
  window._auditItems = Object.fromEntries(items.map(r => [r.id, r]));
}

function renderPager(cur, total) {
  if (total <= 1) { document.getElementById('auditPager').innerHTML = ''; return; }
  const pages = [];
  if (total <= 7) {
    for (let i = 1; i <= total; i++) pages.push(i);
  } else {
    pages.push(1);
    if (cur > 3) pages.push('…');
    for (let i = Math.max(2, cur-1); i <= Math.min(total-1, cur+1); i++) pages.push(i);
    if (cur < total - 2) pages.push('…');
    pages.push(total);
  }
  document.getElementById('auditPager').innerHTML = [
    `<button class="pager-btn" onclick="loadAudit(${cur-1})" ${cur===1?'disabled style="opacity:.4"':''}>‹</button>`,
    ...pages.map(p => p === '…'
      ? `<span style="color:#475569;padding:0 0.25rem;">…</span>`
      : `<button class="pager-btn${p===cur?' active':''}" onclick="loadAudit(${p})">${p}</button>`),
    `<button class="pager-btn" onclick="loadAudit(${cur+1})" ${cur===total?'disabled style="opacity:.4"':''}>›</button>`,
  ].join('');
}

function openDetail(id) {
  const r = (window._auditItems || {})[id];
  if (!r) return;
  const rows = [
    ['时间',   r.created_at],
    ['分类',   _CAT_NAMES[r.category] || r.category],
    ['操作',   _ACTION_NAMES[r.action] || r.action],
    ['来源',   r.source],
    ['操作者', r.operator_name ? `${r.operator_name} (${r.operator_tg||''})` : (r.operator_tg||'-')],
    ['目标',   r.target_name   ? `${r.target_name} (${r.target_tg||''})` : (r.target_tg||'-')],
    ['变更前', r.before_val || '-'],
    ['变更后', r.after_val  || '-'],
    ['详情',   r.detail || '-'],
    ['备注',   r.note   || '-'],
    ['IP',     r.ip     || '-'],
  ].filter(([, v]) => v && v !== '-');
  document.getElementById('detailBody').innerHTML = rows.map(([k, v]) =>
    `<div class="detail-kv"><span class="detail-k">${k}</span><span class="detail-v" style="white-space:pre-wrap;">${esc(v)}</span></div>`
  ).join('');
  document.getElementById('detailModal').style.display = 'flex';
}
function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }

function showCleanup()  { document.getElementById('cleanupModal').style.display = 'flex'; }
function closeCleanup() { document.getElementById('cleanupModal').style.display = 'none'; }

async function doCleanup() {
  const days = parseInt(document.getElementById('cleanupDays').value) || 90;
  const res = await api(`/admin/api/audit/cleanup?days=${days}`, { method: 'DELETE' });
  closeCleanup();
  if (res.ok) {
    showToast(`已删除 ${res.deleted} 条 ${res.before} 之前的日志`);
    loadAudit(1);
  } else {
    showToast('清理失败', false);
  }
}

function exportCSV() {
  const p = _params(1);
  p.delete('page');
  p.delete('page_size');
  window.open('/admin/api/audit/export/csv?' + p.toString());
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 目标TG 自动补全 ──────────────────────────────────────────────────────────
function acFetchTarget() {
  const q = document.getElementById('fTargetTg').value.trim();
  // 用户正在输入时清除之前的选择值
  document.getElementById('fTargetTgVal').value = '';
  fetch(`/admin/api/audit/suggest_targets?q=${encodeURIComponent(q)}`)
    .then(r => r.json())
    .then(data => {
      const drop = document.getElementById('acTargetDrop');
      const items = data.items || [];
      if (!items.length) { drop.style.display = 'none'; return; }
      drop.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'ac-item-audit';
        div.textContent = item.name !== String(item.tg)
          ? `${item.name} (${item.tg})`
          : String(item.tg);
        div.onmousedown = e => e.preventDefault();
        div.onclick = () => {
          document.getElementById('fTargetTg').value = div.textContent;
          document.getElementById('fTargetTgVal').value = item.tg;
          drop.style.display = 'none';
        };
        drop.appendChild(div);
      });
      drop.style.display = 'block';
    }).catch(() => {});
}

function acBlurTarget() {
  setTimeout(() => {
    const el = document.getElementById('acTargetDrop');
    if (el) el.style.display = 'none';
  }, 150);
}

// 初始加载
async function loadOperators() {
  try {
    const data = await api('/admin/api/audit/operators');
    if (!data.ok || !data.operators) return;
    const sel = document.getElementById('fOperator');
    data.operators.forEach(op => {
      const opt = document.createElement('option');
      opt.value = op.tg;
      opt.textContent = op.name;
      sel.appendChild(opt);
    });
  } catch (e) { /* 静默失败 */ }
}

loadOperators();
loadAudit(1);
</script>
{% endblock %}
