<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>用户中心</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --bg2: #17171e;
    --card: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.08);
    --accent: #7c6aff;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text2: #9090a8;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --nav-h: 64px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html.tg-light {
    --bg: #f0f0f5;
    --bg2: #ffffff;
    --card: rgba(0,0,0,0.04);
    --card-border: rgba(0,0,0,0.08);
    --text: #1a1a2e;
    --text2: #6060780;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 顶部标题栏 ── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg2);
    border-bottom: 1px solid var(--card-border);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    backdrop-filter: blur(12px);
  }
  .topbar-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .topbar-info { flex: 1; min-width: 0; }
  .topbar-name { font-size: 15px; font-weight: 700; truncate: ellipsis; }
  .topbar-sub { font-size: 11px; color: var(--text2); }

  /* ── 页面容器 ── */
  .page { display: none; padding: 16px; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); }
  .page.active { display: block; }

  /* ── 底部导航 ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    height: calc(var(--nav-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: var(--bg2);
    border-top: 1px solid var(--card-border);
    display: flex; align-items: center;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 10px 0; cursor: pointer;
    color: var(--text2); font-size: 11px; transition: color .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item i { font-size: 20px; transition: transform .2s; }
  .nav-item.active { color: var(--accent2); }
  .nav-item.active i { transform: scale(1.1); }

  /* ── 卡片 ── */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
  }
  .card-title {
    font-size: 13px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px;
  }

  /* ── 搜索框 ── */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text2); }
  .search-input {
    width: 100%; padding: 12px 12px 12px 40px;
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; color: var(--text); font-size: 15px;
    outline: none; font-family: inherit; transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text2); }

  /* ── 媒体卡片 ── */
  .media-list { display: flex; flex-direction: column; gap: 10px; }
  .media-card {
    display: flex; gap: 12px; align-items: center;
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 12px; cursor: pointer;
    transition: border-color .2s, transform .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .media-card:active { transform: scale(.98); }
  .media-poster {
    width: 52px; height: 78px; border-radius: 8px; object-fit: cover;
    background: var(--card-border); flex-shrink: 0;
  }
  .media-poster-placeholder {
    width: 52px; height: 78px; border-radius: 8px;
    background: var(--card-border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 20px;
  }
  .media-info { flex: 1; min-width: 0; }
  .media-title { font-size: 14px; font-weight: 700; margin-bottom: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .media-orig { font-size: 11px; color: var(--text2); margin-bottom: 5px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .media-meta { display: flex; gap: 6px; align-items: center; }
  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 7px; border-radius: 99px; font-size: 11px; font-weight: 600;
  }
  .badge-movie { background: rgba(124,106,255,.2); color: var(--accent2); }
  .badge-tv { background: rgba(52,211,153,.15); color: var(--success); }
  .badge-year { background: var(--card-border); color: var(--text2); }
  .badge-vote { background: rgba(251,191,36,.15); color: var(--warning); }
  .badge-pending { background: rgba(251,191,36,.15); color: var(--warning); }
  .badge-processing { background: rgba(124,106,255,.2); color: var(--accent2); }
  .badge-completed { background: rgba(52,211,153,.15); color: var(--success); }
  .badge-rejected { background: rgba(248,113,113,.15); color: var(--danger); }

  /* 申请按钮 */
  .btn-request {
    padding: 7px 14px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
    white-space: nowrap; transition: opacity .2s, transform .15s;
    font-family: inherit;
  }
  .btn-request:active { transform: scale(.95); opacity: .85; }
  .btn-request:disabled { opacity: .5; cursor: default; transform: none; }

  /* ── 画像页面 ── */
  .profile-hero-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 24px 20px 20px; margin-bottom: 12px;
    text-align: center; position: relative; overflow: hidden;
  }
  .profile-hero-card::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,255,.18), transparent 70%);
    pointer-events: none;
  }
  .profile-avatar {
    width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 900; color: #fff;
    box-shadow: 0 4px 20px rgba(124,106,255,.35);
  }
  .profile-name { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
  .profile-join-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600;
    background: rgba(52,211,153,.15); color: var(--success); border: 1px solid rgba(52,211,153,.3);
  }
  /* 播放统计三栏 */
  .play-stats-row {
    display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr;
    margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--card-border);
  }
  .play-stat { text-align: center; padding: 0 8px; }
  .play-stat-divider { background: var(--card-border); }
  .play-stat-val { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
  .play-stat-lbl { font-size: 11px; color: var(--text2); }
  /* 账号信息2x2 */
  .acct-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .acct-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 14px 16px; position: relative; overflow: hidden;
  }
  .acct-card-icon {
    position: absolute; top: 12px; right: 14px;
    font-size: 18px; color: var(--card-border); opacity: .7;
  }
  .acct-card-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .acct-card-value { font-size: 18px; font-weight: 900; line-height: 1.2; }
  .acct-card-unit { font-size: 12px; font-weight: 500; color: var(--accent2); margin-left: 4px; vertical-align: baseline; }
  /* 执念最爱 */
  .top-item-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 14px; margin-bottom: 12px;
    display: flex; gap: 14px; align-items: center;
  }
  .top-item-poster {
    width: 72px; height: 108px; border-radius: 10px; object-fit: cover; flex-shrink: 0;
    background: var(--card-border);
  }
  .top-item-poster-ph {
    width: 72px; height: 108px; border-radius: 10px; flex-shrink: 0;
    background: var(--card-border); display: flex; align-items: center;
    justify-content: center; color: var(--text2); font-size: 22px;
  }
  .top-item-meta { flex: 1; min-width: 0; }
  .top-item-label {
    font-size: 11px; font-weight: 700; color: var(--danger);
    display: flex; align-items: center; gap: 4px; margin-bottom: 6px; text-transform: uppercase;
  }
  .top-item-name { font-size: 16px; font-weight: 900; margin-bottom: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .top-item-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .top-item-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 99px; font-size: 12px; font-weight: 600;
    background: var(--card-border);
  }
  /* 观影成就 */
  .achieve-section-title {
    font-size: 14px; font-weight: 700; color: var(--text2);
    display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
  }
  .achieve-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .achieve-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 99px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--card-border); background: var(--card);
    white-space: nowrap;
  }
  .achieve-badge.lit { border-color: rgba(124,106,255,.4); background: rgba(124,106,255,.12); color: var(--accent2); }
  .achieve-badge.gold { border-color: rgba(251,191,36,.4); background: rgba(251,191,36,.1); color: var(--warning); }
  .achieve-badge.green { border-color: rgba(52,211,153,.4); background: rgba(52,211,153,.1); color: var(--success); }
  .achieve-badge.red { border-color: rgba(248,113,113,.4); background: rgba(248,113,113,.1); color: var(--danger); }
  .achieve-badge.dim { opacity: .35; }

  /* ── 历史列表 ── */
  .history-item {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 12px; margin-bottom: 8px;
  }
  .history-title { font-size: 14px; font-weight: 700; margin-bottom: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-meta { display: flex; justify-content: space-between; align-items: center; }
  .history-date { font-size: 11px; color: var(--text2); }

  /* ── 分区切换 ── */
  .tab-switcher { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab-btn {
    padding: 7px 14px; border-radius: 10px; border: 1px solid var(--card-border);
    background: var(--card); color: var(--text2); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border-color: transparent; }

  /* ── 空状态 ── */
  .empty {
    text-align: center; padding: 40px 20px; color: var(--text2);
  }
  .empty i { font-size: 40px; margin-bottom: 12px; display: block; opacity: .5; }

  /* ── Toast ── */
  .toast-wrap {
    position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
    z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    width: calc(100% - 32px); max-width: 380px;
  }
  .toast {
    background: var(--bg2); border: 1px solid var(--card-border);
    border-radius: 10px; padding: 10px 14px;
    font-size: 13px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,.4);
    animation: slideIn .25s ease; display: flex; gap: 8px; align-items: center;
  }
  .toast.ok { border-color: var(--success); color: var(--success); }
  .toast.err { border-color: var(--danger); color: var(--danger); }
  .toast.info { border-color: var(--accent); color: var(--accent2); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── 加载动画 ── */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid currentColor;
    border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-center { display: flex; justify-content: center; padding: 40px; }

  .section-title {
    font-size: 18px; font-weight: 900; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title i { color: var(--accent2); }
</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div class="topbar">
  <div class="topbar-avatar" id="topAvatar">?</div>
  <div class="topbar-info">
    <div class="topbar-name" id="topName">加载中...</div>
    <div class="topbar-sub" id="topSub">Sakura Emby</div>
  </div>
</div>

<!-- Toast 容器 -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- ===== 求片页 ===== -->
<div class="page active" id="page-request">
  <div class="section-title"><i class="fa-solid fa-film"></i>求片</div>

  <div class="tab-switcher">
    <button class="tab-btn active" onclick="switchSubTab('search')">搜索</button>
    <button class="tab-btn" onclick="switchSubTab('my-requests')">我的申请</button>
  </div>

  <!-- 搜索子页 -->
  <div id="sub-search">
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input class="search-input" id="searchInput" type="text" placeholder="输入影片名称..." autocomplete="off">
    </div>
    <div id="searchResults" class="media-list"></div>
    <div id="trendingSection">
      <div class="card-title" style="margin-bottom:10px;">本周热门</div>
      <div id="trendingList" class="media-list">
        <div class="loading-center"><span class="spinner"></span></div>
      </div>
    </div>
  </div>

  <!-- 我的申请子页 -->
  <div id="sub-my-requests" style="display:none;">
    <div id="myRequestsList">
      <div class="loading-center"><span class="spinner"></span></div>
    </div>
  </div>
</div>

<!-- ===== 画像页 ===== -->
<div class="page" id="page-profile">
  <div id="profileContent">
    <div class="loading-center"><span class="spinner"></span></div>
  </div>
</div>

<!-- 底部导航 -->
<nav class="bottom-nav">
  <div class="nav-item active" id="nav-request" onclick="switchPage('request')">
    <i class="fa-solid fa-film"></i>
    <span>求片</span>
  </div>
  <div class="nav-item" id="nav-profile" onclick="switchPage('profile')">
    <i class="fa-solid fa-user-circle"></i>
    <span>我的</span>
  </div>
</nav>

<!-- ── 求片确认弹窗 ─────────────────────────────────────────────────────────── -->
<div id="confirmModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; overflow-y:auto; padding:16px;">
  <div style="background:var(--bg2); border-radius:20px; border:1px solid var(--card-border); max-width:400px; margin:0 auto; padding:0; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.6);">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px 12px;">
      <div style="font-size:16px; font-weight:800; color:var(--text);">确认点播请求</div>
      <button onclick="closeConfirmModal()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:4px;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div style="display:flex; gap:12px; padding:0 20px 14px;">
      <div id="cmPoster" style="flex-shrink:0;"></div>
      <div style="flex:1; min-width:0;">
        <div id="cmTitle" style="font-size:15px; font-weight:700; color:var(--text); margin-bottom:4px;"></div>
        <div id="cmOrigTitle" style="font-size:12px; color:var(--text2); margin-bottom:6px;"></div>
        <div id="cmMeta" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;"></div>
        <div id="cmOverview" style="font-size:12px; color:var(--text2); line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;"></div>
      </div>
    </div>
    <div style="margin:0 20px 14px; background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.3); border-radius:10px; padding:10px 12px; display:flex; gap:8px; align-items:flex-start;">
      <i class="fa-solid fa-circle-info" style="color:#818cf8; margin-top:2px; flex-shrink:0;"></i>
      <span style="font-size:12px; color:var(--text2); line-height:1.5;">提交请求后，管理员将审核您的请求。通过审核后，内容将会被添加到服务器中。请注意您的点播配额限制。</span>
    </div>
    <div style="padding:0 20px 14px;">
      <label style="font-size:13px; font-weight:600; color:var(--text2); display:block; margin-bottom:6px;">备注（可选）</label>
      <textarea id="cmNote" maxlength="500" rows="3"
        placeholder="您可以添加备注信息，如特定的版本要求、字幕语言等..."
        style="width:100%; background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:10px 12px; color:var(--text); font-size:13px; resize:none; box-sizing:border-box; font-family:inherit; outline:none;"
        oninput="document.getElementById('cmCount').textContent=this.value.length"
      ></textarea>
      <div style="text-align:right; font-size:11px; color:var(--text2); margin-top:4px;"><span id="cmCount">0</span> / 500</div>
    </div>
    <div style="padding:0 20px 20px; display:flex; gap:10px;">
      <button onclick="closeConfirmModal()" style="flex:1; padding:12px; border-radius:12px; background:var(--card); color:var(--text2); border:1px solid var(--card-border); font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; -webkit-tap-highlight-color:transparent;">取消</button>
      <button id="cmSubmit" onclick="submitConfirmed()" style="flex:2; padding:12px; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:none; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; -webkit-tap-highlight-color:transparent;">提交请求</button>
    </div>
  </div>
</div>

<!-- ── 申请详情弹窗 ─────────────────────────────────────────────────────────── -->
<div id="detailModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; padding:16px; align-items:center; justify-content:center;">
  <div style="background:var(--bg2); border-radius:20px; border:1px solid var(--card-border); width:100%; max-width:400px; padding:0; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.6);">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px 12px; border-bottom:1px solid var(--card-border);">
      <div style="font-size:16px; font-weight:800; color:var(--text);">申请详情</div>
      <button onclick="closeDetailModal()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:4px;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="detailContent" style="padding:16px 20px 20px;"></div>
  </div>
</div>

<script>
// ── Telegram WebApp 初始化 ─────────────────────────────────────────────────────
const twa = window.Telegram.WebApp;
twa.expand();
twa.ready();
if (twa.colorScheme === 'light') document.documentElement.classList.add('tg-light');

const INIT_DATA = twa.initData || '';
let userProfile = null;
let trendingLoaded = false;
let myRequestsLoaded = false;
// tmdb_id → status 字典，用于跨页面持久化按钮状态
let requestStatusMap = {};

function apiHeaders() {
  return { 'Content-Type': 'application/json', 'X-Init-Data': INIT_DATA };
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'info', duration = 3000) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type === 'ok' ? 'circle-check' : type === 'err' ? 'circle-xmark' : 'circle-info';
  el.innerHTML = `<i class="fa-solid fa-${icon}"></i><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, duration);
}

// ── 页面切换 ───────────────────────────────────────────────────────────────────
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');

  if (name === 'request' && !trendingLoaded) loadTrending();
  if (name === 'profile') loadProfile();
}

// ── 子标签切换 ─────────────────────────────────────────────────────────────────
let currentSubTab = 'search';
function switchSubTab(tab) {
  currentSubTab = tab;
  document.querySelectorAll('#page-request .tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'search') || (i === 1 && tab === 'my-requests'));
  });
  document.getElementById('sub-search').style.display = tab === 'search' ? '' : 'none';
  document.getElementById('sub-my-requests').style.display = tab === 'my-requests' ? '' : 'none';
  if (tab === 'my-requests' && !myRequestsLoaded) loadMyRequests();
}

// ── 申请按钮构建 ──────────────────────────────────────────────────────────────────
function buildRequestBtn(item) {
  const status = requestStatusMap[item.tmdb_id];
  if (status === 'completed') {
    return `<button class="btn-request" data-tmdb-id="${item.tmdb_id}" style="background:linear-gradient(135deg,#34d399,#10b981);cursor:default;" disabled>✓ 已入库</button>`;
  }
  if (status === 'pending' || status === 'processing') {
    return `<button class="btn-request" data-tmdb-id="${item.tmdb_id}" style="opacity:0.55;cursor:default;" disabled>✓ 已申请</button>`;
  }
  return `<button class="btn-request" data-tmdb-id="${item.tmdb_id}" onclick='openConfirmModal(${JSON.stringify(item)})'>申请</button>`;}

// ── 批量检查 Emby 入库状态 ────────────────────────────────────────────────────
async function checkLibraryStatus(items, containerId) {
  const tmdbIds = items.map(i => i.tmdb_id).filter(id => id && requestStatusMap[id] !== 'completed');
  if (!tmdbIds.length) return;
  try {
    const resp = await fetch('/miniapp/check_library', {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({ tmdb_ids: tmdbIds }),
    });
    const data = await resp.json();
    const map = data.library_map || {};
    const container = document.getElementById(containerId);
    for (const [tmdbId, inLib] of Object.entries(map)) {
      if (!inLib) continue;
      requestStatusMap[tmdbId] = 'completed';
      if (!container) continue;
      container.querySelectorAll(`[data-tmdb-id="${tmdbId}"]`).forEach(btn => {
        btn.textContent = '✓ 已入库';
        btn.style.background = 'linear-gradient(135deg,#34d399,#10b981)';
        btn.style.cursor = 'default';
        btn.style.opacity = '1';
        btn.disabled = true;
        btn.onclick = null;
      });
    }
  } catch (e) {
    // 非致命错误，静默处理
  }
}

// ── 加载申请状态字典 ────────────────────────────────────────────────────────────
async function loadMyStatus() {
  try {
    const resp = await fetch('/miniapp/my_status', { headers: apiHeaders() });
    const data = await resp.json();
    requestStatusMap = data.status_map || {};
  } catch (e) {
    // 非致命错误，静默处理
  }
}

// ── 用户认证 ───────────────────────────────────────────────────────────────────
async function initUser() {
  try {
    const resp = await fetch('/miniapp/auth', { method: 'POST', headers: apiHeaders() });
    const data = await resp.json();
    if (!data.ok) { showToast(data.msg || '认证失败', 'err'); return; }
    userProfile = data;

    // 顶部栏
    const name = data.tg_name || data.emby_name || '用户';
    document.getElementById('topAvatar').textContent = (name[0] || '?').toUpperCase();
    document.getElementById('topName').textContent = name;
    document.getElementById('topSub').textContent = data.has_account
      ? `Emby: ${data.emby_name} · ${data.level_name}` : '尚未注册账号';
  } catch (e) {
    showToast('网络错误，请稍后重试', 'err');
  }
}

// ── 热门内容 ───────────────────────────────────────────────────────────────────
async function loadTrending() {
  trendingLoaded = true;
  try {
    const resp = await fetch('/miniapp/trending', { headers: apiHeaders() });
    const data = await resp.json();
    if (data.error || !data.results?.length) {
      document.getElementById('trendingList').innerHTML = '<div class="empty"><i class="fa-solid fa-wifi-slash"></i>影视数据暂不可用</div>';
      return;
    }
    renderMediaList(data.results, 'trendingList');
  } catch {
    document.getElementById('trendingList').innerHTML = '<div class="empty"><i class="fa-solid fa-wifi-slash"></i>加载失败</div>';
  }
}

// ── 搜索 ───────────────────────────────────────────────────────────────────────
let searchTimer = null;
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (!q) {
      document.getElementById('searchResults').innerHTML = '';
      document.getElementById('trendingSection').style.display = '';
      return;
    }
    document.getElementById('trendingSection').style.display = 'none';
    document.getElementById('searchResults').innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
    searchTimer = setTimeout(() => doSearch(q), 500);
  });
});

async function doSearch(q) {
  try {
    const resp = await fetch(`/miniapp/search?q=${encodeURIComponent(q)}`, { headers: apiHeaders() });
    const data = await resp.json();
    if (data.error) {
      document.getElementById('searchResults').innerHTML = '<div class="empty"><i class="fa-solid fa-wifi-slash"></i>影视搜索暂不可用</div>';
      return;
    }
    renderMediaList(data.results || [], 'searchResults');
  } catch {
    document.getElementById('searchResults').innerHTML = '<div class="empty"><i class="fa-solid fa-wifi-slash"></i>搜索失败</div>';
  }
}

function renderMediaList(items, containerId) {
  const container = document.getElementById(containerId);
  if (!items.length) {
    container.innerHTML = '<div class="empty"><i class="fa-solid fa-face-meh"></i>暂无结果</div>';
    return;
  }
  container.innerHTML = items.map(item => `
    <div class="media-card">
      ${item.poster
        ? `<img class="media-poster" src="${item.poster}" loading="lazy" alt="${item.title}">`
        : `<div class="media-poster-placeholder"><i class="fa-solid fa-film"></i></div>`}
      <div class="media-info">
        <div class="media-title">${item.title}</div>
        ${item.orig_title && item.orig_title !== item.title ? `<div class="media-orig">${item.orig_title}</div>` : ''}
        <div class="media-meta">
          <span class="badge badge-${item.media_type}">${item.media_type === 'movie' ? '电影' : '剧集'}</span>
          ${item.year ? `<span class="badge badge-year">${item.year}</span>` : ''}
          ${item.vote ? `<span class="badge badge-vote">⭐ ${item.vote}</span>` : ''}
        </div>
      </div>
      ${buildRequestBtn(item)}
    </div>
  `).join('');
  // 异步批量检查 Emby 入库状态，更新按钮（非阻塞）
  checkLibraryStatus(items, containerId);
}

// ── 求片确认弹窗 ───────────────────────────────────────────────────────────────
let confirmItem = null;

function openConfirmModal(item) {
  confirmItem = item;
  // 封面
  const posterEl = document.getElementById('cmPoster');
  posterEl.innerHTML = item.poster
    ? `<img src="${item.poster}" style="width:72px;height:100px;object-fit:cover;border-radius:8px;" />`
    : `<div style="width:72px;height:100px;background:var(--card);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);"><i class='fa-solid fa-film'></i></div>`;
  document.getElementById('cmTitle').textContent = item.title || '';
  document.getElementById('cmOrigTitle').textContent = (item.orig_title && item.orig_title !== item.title) ? item.orig_title : '';
  document.getElementById('cmMeta').innerHTML = [
    `<span class="badge badge-${item.media_type}">${item.media_type === 'movie' ? '电影' : '剧集'}</span>`,
    item.year ? `<span class="badge badge-year">${item.year}</span>` : '',
    item.vote ? `<span class="badge badge-vote">⭐ ${item.vote}</span>` : '',
  ].join('');
  document.getElementById('cmOverview').textContent = item.overview || '';
  document.getElementById('cmNote').value = '';
  document.getElementById('cmCount').textContent = '0';
  const btn = document.getElementById('cmSubmit');
  btn.disabled = false;
  btn.innerHTML = '提交请求';
  document.getElementById('confirmModal').style.display = 'block';
}

function closeConfirmModal() {
  document.getElementById('confirmModal').style.display = 'none';
  confirmItem = null;
}

async function submitConfirmed() {
  if (!confirmItem) return;
  const btn = document.getElementById('cmSubmit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  const note = document.getElementById('cmNote').value.trim();
  // 先保存到局部变量，closeConfirmModal() 会把 confirmItem 置为 null
  const item = confirmItem;
  try {
    const resp = await fetch('/miniapp/requests', {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({ ...item, user_note: note }),
    });
    const data = await resp.json();
    closeConfirmModal();

    if (data.ok) {
      requestStatusMap[item.tmdb_id] = 'pending';
      showToast(data.msg || '申请已提交', 'ok');
      _updateRequestBtns(item.tmdb_id, 'pending');
      myRequestsLoaded = false;
    } else if (data.status === 'completed') {
      requestStatusMap[item.tmdb_id] = 'completed';
      showToast(data.msg, 'info');
      _updateRequestBtns(item.tmdb_id, 'completed');
    } else if (data.status === 'duplicate') {
      requestStatusMap[item.tmdb_id] = requestStatusMap[item.tmdb_id] || 'pending';
      showToast(data.msg, 'info');
      _updateRequestBtns(item.tmdb_id, requestStatusMap[item.tmdb_id]);
    } else {
      showToast(data.msg || '申请失败', 'err');
    }
  } catch {
    closeConfirmModal();
    showToast('网络错误', 'err');
  }
}

function _updateRequestBtns(tmdb_id, status) {
  document.querySelectorAll(`[data-tmdb-id="${tmdb_id}"]`).forEach(btn => {
    if (status === 'completed') {
      btn.textContent = '✓ 已入库';
      btn.style.background = 'linear-gradient(135deg,#34d399,#10b981)';
      btn.style.cursor = 'default'; btn.style.opacity = '1';
      btn.disabled = true; btn.onclick = null;
    } else if (status === 'pending' || status === 'processing') {
      btn.textContent = '✓ 已申请';
      btn.style.opacity = '0.55'; btn.style.cursor = 'default';
      btn.disabled = true; btn.onclick = null;
    }
  });
}

// ── 申请详情弹窗 ───────────────────────────────────────────────────────────────
async function openDetailModal(reqId) {
  document.getElementById('detailModal').style.display = 'flex';
  document.getElementById('detailContent').innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
  try {
    const resp = await fetch(`/miniapp/requests/${reqId}`, { headers: apiHeaders() });
    if (!resp.ok) throw new Error('not found');
    const r = await resp.json();
    const statusText = { pending: '待审核', processing: '处理中', completed: '已入库', rejected: '已拒绝' };
    const statusColor = { pending: '#fde047', processing: '#93c5fd', completed: '#86efac', rejected: '#fca5a5' };
    document.getElementById('detailContent').innerHTML = `
      <p style="font-size:15px;font-weight:700;color:var(--text);margin:0 0 4px;">${r.title || ''}</p>
      <p style="font-size:12px;color:var(--text2);margin:0 0 10px;">${r.orig_title || ''} ${r.year ? '('+r.year+')' : ''}</p>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
        <span class="badge badge-${r.media_type}">${r.media_type==='movie'?'电影':'剧集'}</span>
        <span style="padding:2px 10px;border-radius:9999px;font-size:12px;font-weight:500;background:rgba(0,0,0,.2);color:${statusColor[r.status]||'#e2e8f0'};">${statusText[r.status]||r.status}</span>
      </div>
      <div style="background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:12px;margin-bottom:10px;">
        <div style="font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:600;">用户备注</div>
        <div style="font-size:13px;color:var(--text);">${r.user_note || '<span style="color:var(--text2)">暂无备注</span>'}</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:12px;">
        <div style="font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:600;">管理员备注</div>
        <div style="font-size:13px;color:var(--text);">${r.note || '<span style="color:var(--text2)">暂无备注</span>'}</div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-top:10px;text-align:right;">申请时间：${r.created_at}</div>
    `;
  } catch {
    document.getElementById('detailContent').innerHTML = '<div class="empty"><i class="fa-solid fa-circle-exclamation"></i>加载失败</div>';
  }
}

function closeDetailModal() {
  document.getElementById('detailModal').style.display = 'none';
}

// ── 提交求片（已废弃，改由 openConfirmModal → submitConfirmed 调用） ───────────
async function requestMedia(item, btn) {
  // 兼容旧调用（不应再触发，保留以防万一）
  openConfirmModal(item);
}
// ── 我的申请 ───────────────────────────────────────────────────────────────────
async function loadMyRequests() {
  myRequestsLoaded = true;
  const container = document.getElementById('myRequestsList');
  container.innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
  try {
    const resp = await fetch('/miniapp/requests', { headers: apiHeaders() });
    const data = await resp.json();
    const rows = data.requests || [];
    if (!rows.length) {
      container.innerHTML = '<div class="empty"><i class="fa-solid fa-inbox"></i>暂无求片记录</div>';
      return;
    }
    const statusText = { pending: '待审核', processing: '处理中', completed: '已入库', rejected: '已拒绝' };
    const hasNote = r => r.user_note || r.note;
    container.innerHTML = rows.map(r => `
      <div class="history-item" onclick="openDetailModal(${r.id})" style="cursor:pointer; -webkit-tap-highlight-color:transparent;">
        <div style="display:flex; align-items:center; justify-content:space-between;">
          <div class="history-title" style="flex:1; min-width:0;">${r.title}${r.year ? ` (${r.year})` : ''}</div>
          <i class="fa-solid fa-chevron-right" style="color:var(--text2); font-size:11px; margin-left:8px; flex-shrink:0;"></i>
        </div>
        <div class="history-meta">
          <span class="badge badge-${r.status}">${statusText[r.status] || r.status}</span>
          <span class="history-date">${r.created_at}</span>
          ${hasNote(r) ? `<span style="font-size:11px;color:var(--accent2);"><i class="fa-solid fa-comment-dots"></i> 有备注</span>` : ''}
        </div>
      </div>
    `).join('');
  } catch {
    container.innerHTML = '<div class="empty"><i class="fa-solid fa-wifi-slash"></i>加载失败</div>';
  }
}

// ── 用户画像 ───────────────────────────────────────────────────────────────────
async function loadProfile() {
  const container = document.getElementById('profileContent');
  container.innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
  try {
    // 画像页每次打开都拉取最新数据，保证 credits_unit 等字段为最新
    const resp = await fetch('/miniapp/profile', { headers: apiHeaders() });
    const data = await resp.json();
    if (!data || !data.ok) {
      container.innerHTML = '<div class="empty"><i class="fa-solid fa-user-slash"></i>未找到账户信息</div>';
      return;
    }

    // 并行拉取播放统计
    let stats = null;
    if (data.has_account) {
      try {
        const sr = await fetch('/miniapp/my_stats', { headers: apiHeaders() });
        const sd = await sr.json();
        stats = sd.stats || null;
      } catch {}
    }

    const name = data.tg_name || data.emby_name || '用户';
    const initial = (name[0] || '?').toUpperCase();

    // 入驻天数：从 first_play 计算，或显示积分
    let joinDays = null;
    if (stats && stats.first_play) {
      const d = new Date(stats.first_play.replace(' ', 'T'));
      joinDays = Math.max(0, Math.floor((Date.now() - d.getTime()) / 86400000));
    }

    // 到期颜色
    const daysLeft = data.days_left;
    const daysDisplay = daysLeft === null ? '无限期' : daysLeft < 0 ? '已过期' : `${daysLeft}`;
    const daysColor = daysLeft === null ? 'var(--success)' : daysLeft < 7 ? 'var(--danger)' : daysLeft < 30 ? 'var(--warning)' : 'var(--success)';
    const lvColor = { a: 'var(--warning)', b: 'var(--accent2)', c: 'var(--danger)', d: 'var(--text2)' };

    // ── Hero Card ──
    const joinBadge = joinDays !== null
      ? `<div class="profile-join-badge"><i class="fa-solid fa-star"></i>入驻 Emby 第 ${joinDays} 天</div>`
      : `<div class="profile-join-badge" style="background:rgba(124,106,255,.12);color:var(--accent2);border-color:rgba(124,106,255,.3);">`
        + `<i class="fa-solid fa-user"></i>Emby: ${data.emby_name || '未绑定'}</div>`;

    const playCount = stats ? (stats.play_count || 0) : '-';
    const totalHours = stats ? (stats.total_hours || 0) : '-';
    const avgMin = stats ? (stats.avg_minutes || 0) : '-';

    const heroHtml = `
      <div class="profile-hero-card">
        <div class="profile-avatar">${initial}</div>
        <div class="profile-name">${name}</div>
        ${joinBadge}
        <div class="play-stats-row">
          <div class="play-stat">
            <div class="play-stat-val">${playCount}</div>
            <div class="play-stat-lbl">播放频次</div>
          </div>
          <div class="play-stat-divider"></div>
          <div class="play-stat">
            <div class="play-stat-val">${totalHours}</div>
            <div class="play-stat-lbl">沉浸（小时）</div>
          </div>
          <div class="play-stat-divider"></div>
          <div class="play-stat">
            <div class="play-stat-val">${avgMin}</div>
            <div class="play-stat-lbl">均次（分钟）</div>
          </div>
        </div>
      </div>`;

    // ── 账号信息 2×2 ──
    const acctHtml = data.has_account ? `
      <div class="acct-grid">
        <div class="acct-card">
          <div class="acct-card-icon"><i class="fa-regular fa-circle-dot"></i></div>
          <div class="acct-card-label">账号等级</div>
          <div class="acct-card-value" style="color:${lvColor[data.level] || 'var(--text2)'}">
            ${data.level === 'a' ? '👑' : data.level === 'b' ? '🎬' : data.level === 'c' ? '🔒' : '🌱'}
            ${data.level_name}
          </div>
        </div>
        <div class="acct-card">
          <div class="acct-card-icon"><i class="fa-regular fa-calendar"></i></div>
          <div class="acct-card-label">订阅到期日</div>
          <div class="acct-card-value" style="font-size:15px;">${data.expire || '无期限'}</div>
        </div>
        <div class="acct-card">
          <div class="acct-card-icon"><i class="fa-solid fa-coins"></i></div>
          <div class="acct-card-label">账户积分</div>
          <div class="acct-card-value">${data.credits || 0}<span class="acct-card-unit">${data.credits_unit || ''}</span></div>
        </div>
        <div class="acct-card">
          <div class="acct-card-icon"><i class="fa-regular fa-calendar-check"></i></div>
          <div class="acct-card-label">剩余时间</div>
          <div class="acct-card-value" style="color:${daysColor}">${daysDisplay}<span class="acct-card-unit">${daysLeft === null ? '' : '天'}</span></div>
        </div>
      </div>` : '';

    // ── 执念最爱 ──
    let topHtml = '';
    if (stats && stats.top_item && stats.top_item.name) {
      const top = stats.top_item;
      const posterEl = top.poster_url
        ? `<img class="top-item-poster" src="${top.poster_url}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" /><div class="top-item-poster-ph" style="display:none;"><i class="fa-solid fa-film"></i></div>`
        : `<div class="top-item-poster-ph"><i class="fa-solid fa-film"></i></div>`;
      topHtml = `
        <div class="top-item-card">
          ${posterEl}
          <div class="top-item-meta">
            <div class="top-item-label"><i class="fa-solid fa-heart"></i>执念最爱</div>
            <div class="top-item-name">${top.name}</div>
            <div class="top-item-chips">
              <span class="top-item-chip"><i class="fa-solid fa-rotate"></i>N刷 ${top.play_count} 次</span>
              <span class="top-item-chip"><i class="fa-regular fa-clock"></i>沉迷 ${top.hours} 小时</span>
            </div>
          </div>
        </div>`;
    }

    container.innerHTML = heroHtml + acctHtml + topHtml;
  } catch (e) {
    container.innerHTML = '<div class="empty"><i class="fa-solid fa-wifi-slash"></i>加载失败</div>';
  }
}

// ── 启动 ───────────────────────────────────────────────────────────────────────
initUser().then(() => {
  // 先加载状态字典，再渲染热门（保证按钮状态正确）
  loadMyStatus().then(() => loadTrending());
});
