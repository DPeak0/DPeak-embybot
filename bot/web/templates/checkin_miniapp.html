<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>每日签到</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --bg2: #17171e;
    --card: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.08);
    --accent: #7c6aff;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text2: #9090a8;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html.tg-light {
    --bg: #f0f0f5;
    --bg2: #ffffff;
    --card: rgba(0,0,0,0.04);
    --card-border: rgba(0,0,0,0.08);
    --text: #1a1a2e;
    --text2: #606078;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px calc(24px + var(--safe-bottom));
  }

  /* ── 主卡片 ── */
  .main-card {
    width: 100%; max-width: 360px;
    background: var(--bg2);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    padding: 32px 24px 28px;
    box-shadow: 0 12px 60px rgba(0,0,0,.5);
    position: relative;
    overflow: hidden;
  }
  .main-card::before {
    content: '';
    position: absolute; top: -60px; right: -60px;
    width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,255,.15), transparent 70%);
    pointer-events: none;
  }

  /* 头像 */
  .avatar {
    width: 76px; height: 76px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 900; color: #fff;
    margin: 0 auto 14px;
    box-shadow: 0 4px 20px rgba(124,106,255,.4);
  }
  .user-name {
    text-align: center; font-size: 20px; font-weight: 900; margin-bottom: 4px;
  }
  .user-sub {
    text-align: center; font-size: 12px; color: var(--text2); margin-bottom: 24px;
  }

  /* 积分展示 */
  .credits-row {
    display: flex; gap: 10px; margin-bottom: 24px;
  }
  .credits-item {
    flex: 1; background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 14px 12px; text-align: center;
    position: relative; overflow: hidden;
  }
  .credits-item::before {
    content: ''; position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 80px; border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,255,.12), transparent 70%);
  }
  .credits-val {
    font-size: 26px; font-weight: 900; color: var(--accent2);
    display: block; margin-bottom: 4px;
  }
  .credits-lbl { font-size: 11px; color: var(--text2); font-weight: 500; }
  .reward-item .credits-val { color: var(--warning); }

  /* 签到状态提示 */
  .status-tip {
    text-align: center; font-size: 13px; color: var(--text2);
    margin-bottom: 20px; line-height: 1.5;
    min-height: 20px;
  }
  .status-tip.success { color: var(--success); font-weight: 600; }
  .status-tip.already { color: var(--warning); font-weight: 600; }

  /* 签到大按钮 */
  .btn-checkin-main {
    width: 100%; padding: 16px;
    border-radius: 16px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 17px; font-weight: 800;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 24px rgba(124,106,255,.45);
    transition: opacity .2s, transform .15s, box-shadow .2s;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: .3px;
  }
  .btn-checkin-main:active { transform: scale(.97); opacity: .9; }
  .btn-checkin-main:disabled {
    background: linear-gradient(135deg, #34d399, #10b981);
    box-shadow: 0 4px 24px rgba(52,211,153,.35);
    cursor: default; transform: none; opacity: 1;
  }
  .btn-checkin-main.loading { opacity: .7; cursor: default; }

  /* 成就小条 */
  .streak-bar {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 12px; color: var(--text2); margin-top: 14px;
  }
  .streak-bar i { color: var(--warning); }

  /* ── 加载动画 ── */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,.4);
    border-top-color: #fff;
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  .toast-wrap {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 999; display: flex; flex-direction: column; gap: 8px;
    pointer-events: none; width: calc(100% - 40px); max-width: 340px;
  }
  .toast {
    background: var(--bg2); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 11px 16px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
    animation: toastIn .25s ease;
    display: flex; gap: 8px; align-items: center;
  }
  .toast.ok { border-color: var(--success); color: var(--success); }
  .toast.err { border-color: var(--danger); color: var(--danger); }
  .toast.info { border-color: var(--warning); color: var(--warning); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }

  /* ── 庆祝粒子 ── */
  .confetti-wrap {
    position: fixed; inset: 0; pointer-events: none; z-index: 998; overflow: hidden;
  }
  .confetti-dot {
    position: absolute; border-radius: 3px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── 滑动验证弹窗 ── */
  .captcha-overlay {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
    align-items: flex-end; justify-content: center;
    padding: 0 0 calc(var(--safe-bottom) + 16px);
  }
  .captcha-overlay.show { display: flex; }
  .captcha-sheet {
    background: var(--bg2); border: 1px solid var(--card-border);
    border-radius: 28px 28px 20px 20px; padding: 20px 24px 28px;
    width: 100%; max-width: 420px;
    box-shadow: 0 -8px 60px rgba(0,0,0,.6);
    animation: sheetUp .28s cubic-bezier(.4,0,.2,1);
  }
  @keyframes sheetUp { from { transform: translateY(80px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* 抓手 */
  .sheet-handle {
    width: 40px; height: 4px; background: var(--card-border);
    border-radius: 4px; margin: 0 auto 20px;
  }
  /* 图标区 */
  .captcha-head {
    display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;
  }
  .captcha-lock { font-size: 44px; margin-bottom: 10px; line-height: 1; }
  .captcha-label { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
  .captcha-hint { font-size: 12px; color: var(--text2); }

  /* 轨道 */
  .slide-track {
    position: relative; height: 56px; border-radius: 14px; margin-bottom: 20px;
    background: var(--card); border: 1px solid var(--card-border);
    overflow: hidden; user-select: none; -webkit-user-select: none;
  }
  .slide-fill {
    position: absolute; left: 0; top: 0; height: 100%; width: 0;
    background: rgba(124,106,255,.2); border-radius: 14px;
    pointer-events: none;
  }
  .slide-text {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--text2); pointer-events: none; font-weight: 500;
    gap: 6px; transition: opacity .3s;
  }
  .slide-thumb {
    position: absolute; left: 0; top: 0; width: 60px; height: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    cursor: grab; touch-action: none;
    box-shadow: 0 2px 16px rgba(124,106,255,.5);
  }
  .slide-thumb:active { cursor: grabbing; }
  .slide-thumb i { color: #fff; font-size: 20px; }

  /* 取消 */
  .btn-cancel {
    width: 100%; padding: 14px; border-radius: 14px;
    border: 1px solid var(--card-border); background: var(--card);
    color: var(--text2); font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>
<!-- 庆祝粒子容器 -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- 主内容 -->
<div class="main-card" id="mainCard">
  <!-- 加载中占位 -->
  <div id="loadingView" style="text-align:center; padding:20px 0;">
    <div class="spinner" style="border-color:rgba(124,106,255,.3); border-top-color:var(--accent); margin:0 auto;"></div>
  </div>

  <!-- 用户信息（加载后显示） -->
  <div id="userView" style="display:none;">
    <div class="avatar" id="avatarEl">?</div>
    <div class="user-name" id="nameEl">—</div>
    <div class="user-sub" id="subEl">Sakura Emby</div>

    <div class="credits-row">
      <div class="credits-item">
        <span class="credits-val" id="creditsVal">—</span>
        <span class="credits-lbl" id="creditsLbl">当前积分</span>
      </div>
      <div class="credits-item reward-item">
        <span class="credits-val" id="rewardRange">—</span>
        <span class="credits-lbl">今日奖励</span>
      </div>
    </div>

    <div class="status-tip" id="statusTip">点击下方按钮完成今日签到</div>

    <button id="checkinBtn" class="btn-checkin-main" onclick="onCheckinClick()">
      <i class="fa-solid fa-calendar-check"></i>
      <span id="btnText">立即签到</span>
    </button>

    <div class="streak-bar" id="streakBar" style="display:none;">
      <i class="fa-solid fa-fire"></i>
      <span id="streakText"></span>
    </div>
  </div>
</div>

<!-- ── 滑动验证底部弹窗 ─────────────────────────────────────────────────────── -->
<div class="captcha-overlay" id="captchaOverlay">
  <div class="captcha-sheet">
    <div class="sheet-handle"></div>
    <div class="captcha-head">
      <div class="captcha-lock" id="captchaLock">🔒</div>
      <div class="captcha-label">人机验证</div>
      <div class="captcha-hint">拖动滑块到最右侧完成验证</div>
    </div>
    <div class="slide-track" id="slideTrack">
      <div class="slide-fill" id="slideFill"></div>
      <div class="slide-text" id="slideText">
        <i class="fa-solid fa-arrow-right" style="opacity:.5;"></i>向右滑动
      </div>
      <div class="slide-thumb" id="slideThumb">
        <i class="fa-solid fa-angles-right" id="slideThumbIcon"></i>
      </div>
    </div>
    <button class="btn-cancel" onclick="closeCaptcha()">取消</button>
  </div>
</div>

<script>
// ── Telegram WebApp ────────────────────────────────────────────────────────────
const twa = window.Telegram.WebApp;
twa.expand();
twa.ready();
if (twa.colorScheme === 'light') document.documentElement.classList.add('tg-light');
const INIT_DATA = twa.initData || '';

function apiHeaders() {
  return { 'Content-Type': 'application/json', 'X-Init-Data': INIT_DATA };
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'info', ms = 3500) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type === 'ok' ? 'circle-check' : type === 'err' ? 'circle-xmark' : 'circle-info';
  el.innerHTML = `<i class="fa-solid fa-${icon}"></i><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0'; el.style.transition = 'opacity .3s';
    setTimeout(() => el.remove(), 350);
  }, ms);
}

// ── 庆祝粒子 ──────────────────────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#7c6aff','#a78bfa','#34d399','#fbbf24','#f87171','#60a5fa'];
  const wrap = document.getElementById('confettiWrap');
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const dot = document.createElement('div');
      dot.className = 'confetti-dot';
      const size = Math.random() * 8 + 5;
      dot.style.cssText = `
        left:${Math.random()*100}%;
        top:-20px;
        width:${size}px; height:${size * (Math.random() > .5 ? 1 : 2.5)}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${Math.random()*1.5 + 1.2}s;
        animation-delay:${Math.random()*0.4}s;
        opacity:1;
      `;
      wrap.appendChild(dot);
      setTimeout(() => dot.remove(), 3000);
    }, i * 18);
  }
}

// ── 页面初始化 ─────────────────────────────────────────────────────────────────
let _checkinStatus = null;

async function init() {
  try {
    // 并行拉取 auth 和 checkin_status
    const [authResp, statusResp] = await Promise.all([
      fetch('/miniapp/auth', { method: 'POST', headers: apiHeaders() }),
      fetch('/miniapp/checkin_status', { headers: apiHeaders() }),
    ]);
    const auth = await authResp.json();
    _checkinStatus = await statusResp.json();

    if (!auth.ok) {
      showView('err', auth.msg || '认证失败，请从 Bot 重新打开');
      return;
    }
    if (!_checkinStatus.enabled) {
      showView('disabled');
      return;
    }

    // 填充用户信息
    const name = auth.tg_name || auth.emby_name || '用户';
    document.getElementById('avatarEl').textContent = (name[0] || '?').toUpperCase();
    document.getElementById('nameEl').textContent = name;
    document.getElementById('subEl').textContent = auth.has_account
      ? `Emby: ${auth.emby_name} · ${auth.level_name}` : '尚未绑定 Emby 账号';

    const unit = _checkinStatus.unit || 'pts';
    document.getElementById('creditsVal').textContent = auth.credits || 0;
    document.getElementById('creditsLbl').textContent = `当前${unit}`;
    document.getElementById('rewardRange').textContent =
      `${_checkinStatus.reward_min}~${_checkinStatus.reward_max}`;

    // 签到状态
    if (_checkinStatus.checked) {
      setCheckedState();
    }

    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('userView').style.display = '';
  } catch (e) {
    showView('err', '网络错误，请稍后重试');
  }
}

function showView(type, msg) {
  document.getElementById('loadingView').style.display = 'none';
  const card = document.getElementById('mainCard');
  const icons = { err: 'fa-circle-exclamation', disabled: 'fa-clock' };
  const msgs  = { err: msg || '加载失败', disabled: '签到功能暂未开启' };
  card.innerHTML = `
    <div style="text-align:center; padding:20px 0;">
      <i class="fa-solid ${icons[type]}" style="font-size:40px; color:var(--text2); opacity:.5; margin-bottom:14px; display:block;"></i>
      <div style="font-size:14px; color:var(--text2);">${msgs[type]}</div>
    </div>`;
}

function setCheckedState() {
  const btn = document.getElementById('checkinBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-check"></i><span>今日已签到</span>';
  document.getElementById('statusTip').textContent = '明天再来领积分吧 ✨';
  document.getElementById('statusTip').className = 'status-tip already';
}

// ── 点击签到按钮 ───────────────────────────────────────────────────────────────
function onCheckinClick() {
  const btn = document.getElementById('checkinBtn');
  if (btn.disabled) return;
  openCaptcha();
}

// ── 滑动验证 ───────────────────────────────────────────────────────────────────
let _resolved = false;
let _dragging = false;
let _dragOffset = 0;

function openCaptcha() {
  _resolved = false;
  // 重置
  const thumb = document.getElementById('slideThumb');
  const fill  = document.getElementById('slideFill');
  const text  = document.getElementById('slideText');
  thumb.style.cssText = '';
  fill.style.width = '0';
  fill.style.background = 'rgba(124,106,255,.2)';
  document.getElementById('slideThumbIcon').className = 'fa-solid fa-angles-right';
  document.getElementById('captchaLock').textContent = '🔒';
  text.style.opacity = '1';
  document.getElementById('captchaOverlay').classList.add('show');
}

function closeCaptcha() {
  document.getElementById('captchaOverlay').classList.remove('show');
}

function onSlideSuccess() {
  if (_resolved) return;
  _resolved = true;
  _dragging = false;

  const track = document.getElementById('slideTrack');
  const thumb = document.getElementById('slideThumb');
  const fill  = document.getElementById('slideFill');

  const maxLeft = track.offsetWidth - thumb.offsetWidth;
  thumb.style.transition = 'left .15s ease, background .35s, box-shadow .35s';
  thumb.style.left = maxLeft + 'px';
  fill.style.transition = 'width .15s ease, background .35s';
  fill.style.width = track.offsetWidth + 'px';

  setTimeout(() => {
    thumb.style.background = 'linear-gradient(135deg, #34d399, #10b981)';
    thumb.style.boxShadow = '0 2px 16px rgba(52,211,153,.55)';
    fill.style.background = 'rgba(52,211,153,.22)';
    document.getElementById('slideThumbIcon').className = 'fa-solid fa-check';
    document.getElementById('captchaLock').textContent = '🔓';
    document.getElementById('slideText').style.opacity = '0';
  }, 80);

  // 关闭并执行签到
  setTimeout(() => {
    closeCaptcha();
    doCheckin();
  }, 700);
}

// 拖动逻辑
(function () {
  function cx(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

  function onStart(e) {
    if (_resolved) return;
    _dragging = true;
    _dragOffset = cx(e) - document.getElementById('slideThumb').getBoundingClientRect().left;
    e.preventDefault();
  }
  function onMove(e) {
    if (!_dragging || _resolved) return;
    const track = document.getElementById('slideTrack');
    const thumb = document.getElementById('slideThumb');
    const fill  = document.getElementById('slideFill');
    const rect  = track.getBoundingClientRect();
    const tw    = thumb.offsetWidth;
    const maxL  = rect.width - tw;
    let left = cx(e) - rect.left - _dragOffset;
    left = Math.max(0, Math.min(left, maxL));
    thumb.style.left = left + 'px';
    fill.style.width  = (left + tw) + 'px';
    if (maxL > 0 && left / maxL >= 0.88) onSlideSuccess();
    e.preventDefault();
  }
  function onEnd() {
    if (!_dragging || _resolved) { _dragging = false; return; }
    _dragging = false;
    const thumb = document.getElementById('slideThumb');
    const fill  = document.getElementById('slideFill');
    thumb.style.transition = 'left .32s cubic-bezier(.4,0,.2,1)';
    fill.style.transition  = 'width .32s cubic-bezier(.4,0,.2,1)';
    thumb.style.left = '0';
    fill.style.width = '0';
    setTimeout(() => { thumb.style.transition = ''; fill.style.transition = ''; }, 340);
  }

  document.addEventListener('DOMContentLoaded', () => {
    const thumb = document.getElementById('slideThumb');
    thumb.addEventListener('mousedown',  onStart);
    thumb.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('mousemove',  onMove);
    document.addEventListener('mouseup',    onEnd);
    document.addEventListener('touchmove',  onMove, { passive: false });
    document.addEventListener('touchend',   onEnd);
  });
})();

// ── 执行签到请求 ───────────────────────────────────────────────────────────────
async function doCheckin() {
  const btn     = document.getElementById('checkinBtn');
  const btnText = document.getElementById('btnText');
  btn.disabled = true;
  btn.classList.add('loading');
  btnText.innerHTML = '<span class="spinner"></span>';

  try {
    const resp = await fetch('/miniapp/checkin', { method: 'POST', headers: apiHeaders() });
    const data = await resp.json();

    btn.classList.remove('loading');

    if (data.ok) {
      // 成功
      btn.innerHTML = '<i class="fa-solid fa-check"></i><span>签到成功</span>';
      const tip = document.getElementById('statusTip');
      tip.textContent = `🎉 获得 +${data.reward} ${data.unit}，累计 ${data.total} ${data.unit}`;
      tip.className = 'status-tip success';
      // 更新积分显示
      document.getElementById('creditsVal').textContent = data.total;
      showToast(data.msg || '签到成功！', 'ok', 4000);
      launchConfetti();
      // Telegram 触感反馈
      try { twa.HapticFeedback.notificationOccurred('success'); } catch {}
    } else if (data.already) {
      setCheckedState();
      showToast(data.msg, 'info');
    } else {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-calendar-check"></i><span>立即签到</span>';
      showToast(data.msg || '签到失败，请重试', 'err');
    }
  } catch {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.innerHTML = '<i class="fa-solid fa-calendar-check"></i><span>立即签到</span>';
    showToast('网络错误，请稍后重试', 'err');
  }
}

// 启动
init();
</script>
</body>
</html>
